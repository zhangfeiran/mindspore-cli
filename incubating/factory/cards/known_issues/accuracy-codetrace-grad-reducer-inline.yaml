kind: known_issue
id: accuracy-codetrace-grad-reducer-inline
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [transformer, code-trace, ir, grad-reducer, inline, component-test, ascend]
occurrence_count: 1
affects_operators: [allfinite, grad-reducer]
affects_platforms: [ascend]
detection:
  pattern: "Unsupported op \\[AllFinite\\] on CPU|Code trace accuracy is not 1\\.0|grads = self\\.grad_reducer\\(grads\\)"
description: |
  The Transformer reliability/code-trace case in mindspore/org-issues#41905
  can fail with a misleading scheduler log that reports `Unsupported op
  [AllFinite] on CPU`. That log is not the real training failure. The actual
  issue is that `self.grad_reducer` is a Cell and appears in IR as a call-func
  node, which may be inlined or optimized away. After optimization, the line
  `grads = self.grad_reducer(grads)` is no longer present in the final IR, so
  the code-trace accuracy check incorrectly treats the case as failed.
fix:
  summary: Adapt the code-trace testcase to ignore the optimized grad_reducer line instead of treating the missing IR line as a failure
  diff: |
    --- a/cases/03subject_test/00reliability_availability/02reliability_availability_features/08code_trace/transformer_for_train.py
    +++ b/cases/03subject_test/00reliability_availability/02reliability_availability_features/08code_trace/transformer_for_train.py
    @@
    -grads = self.grad_reducer(grads)
    +grads = self.grad_reducer(grads)  # <IGNORE>
  operator_id: grad-reducer
