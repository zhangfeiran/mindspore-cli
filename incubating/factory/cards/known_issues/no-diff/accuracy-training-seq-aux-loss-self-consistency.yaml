description: |
  mindspore/org-issues#42403 reports loss mismatch when DeepSeek-MCore resumes
  training under a changed DP/MBN layout. The public issue analysis says this
  is not a framework code bug with a concrete patch. Two factors are called
  out instead: `seq_aux_loss` is not self-consistent by design when micro-batch
  related settings change, and the baseline was taken from a very early
  checkpoint where the model is still numerically unstable.
