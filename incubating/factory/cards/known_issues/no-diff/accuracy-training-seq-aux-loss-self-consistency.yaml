fix:
  summary: "No public code patch; compare convergence or determinism instead of enforcing strict resumed-loss equality across changed MBN layouts"
  diff: |
    Public issue comments do not provide a framework source patch.

    Extracted handling guidance:
    - do not treat `seq_aux_loss` as strictly self-consistent when MBN-related
      settings change during scale in/out
    - avoid using an early, unstable checkpoint as the golden baseline
    - for this scene, validate convergence and determinism rather than exact
      resumed loss equality
