kind: known_issue
id: function-runtime-eval-indexes-none-metric-routing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, eval, metrics, eval_indexes]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(eval_indexes.*None|metrics|top_1_accuracy)"
description: |
  mindspore/org-issues#42196 reports a routing bug in evaluation mode. When
  `eval_indexes=None`, the framework forwards the raw `evalnet` output to the
  metric object, but the output layout does not match the metric's expected
  `(logits, label)` input contract, so the computed accuracy is wrong.
issue_refs:
  - issue_id: "42196"
    title: "[Bug]: eval_indexes传入 None ，评估网络（evalnet）的输出被当作指标（metrics）的输入，输出的格式与指标函数所需参数不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42196"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Normalize eval outputs before feeding metrics when `eval_indexes` is unset"
  diff: |
    --- a/mindspore/train/model.py
    +++ b/mindspore/train/model.py
    @@
    -metric.update(*eval_outputs)
    +metric_inputs = _normalize_metric_inputs(eval_outputs, eval_indexes)
    +metric.update(*metric_inputs)
