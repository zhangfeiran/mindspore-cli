  level: observed
tags: [b-componenttest, mindspore-org-issues, reversesequence, aicpu, ge, rnn, ascend]
occurrence_count: 1
affects_operators: [reversesequence]
affects_platforms: [ascend]
detection:
  pattern: "(Get cust aicpu kernel bin from attr cust_aicpu_kernel failed|cust_aicpu_kernel|ReverseSequence)"
description: |
  `ReverseSequence` 在 Ascend GE 模式下如果没有正确关联到对应的自定义 AICPU kernel binary，
  会在 RNN 等依赖路径中报 `Get cust aicpu kernel bin from attr cust_aicpu_kernel failed`。

  已知触发样例来自 issue `42277`：`nn.RNN` 带 `seq_length` 输入的兼容性用例在 GE 图模式执行时失败，
  根因特征是 `ReverseSequence` 需要的 `cust_aicpu_kernel` 无法从 attr 中解析到有效 bin。
issue_refs:
  - issue_id: "42277"
    title: "[Bug]: ReverseSequence ascend后端GE模式报错Get cust aicpu kernel bin from attr cust_aicpu_kernel failed"
    url: "https://gitcode.com/mindspore/org-issues/issues/42277"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "补齐 ReverseSequence 在 GE 路径上的 AICPU binary 注册与打包，确保 `cust_aicpu_kernel` 能解析到实际 bin。"
  diff: |
    1. 检查 `ReverseSequence` 对应的 AICPU kernel 名称、attr 和注册信息是否一致，避免图编译阶段写入了空或错误的 `cust_aicpu_kernel`。
    2. 确认发布物中包含该算子的 AICPU bin，并且 GE 搜索路径能命中对应文件。
    3. 为 `RNN + seq_length` 的 GE 图模式补门禁，覆盖 `int32/int64 seq_length` 和 `batch_first/bidirectional` 组合。
