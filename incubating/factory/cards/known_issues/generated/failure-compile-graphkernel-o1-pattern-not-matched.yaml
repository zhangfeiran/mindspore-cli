detection:
  pattern: "(图算融合O1没走进图算|GraphKernel.*fusion|Add_ReLU_ReLU_fusion|MatMul_AllReduce)"
description: |
  GraphKernel O1 融合在特性交互或并行场景下可能根本没有命中预期 pattern，表现为保存下来的 IR 中缺失目标 fusion 名称，
  进而导致门禁按“应融合”断言失败。

  已知触发样例来自 issue `42174`：在 Ascend 图模式、`CONTEXT_JIT_LEVEL=O1` 且通过 JSON
  配置 `AllReduce,MatMul` 融合开关的场景下，期望出现的 `Add_ReLU_ReLU_fusion` 和 `MatMul_AllReduce`
  pattern 在 IR 中计数为 `0`。
issue_refs:
  - issue_id: "42174"
    title: "[Bug]: 图算融合O1没走进图算，融合失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42174"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "修正 GraphKernel O1 在并行/JSON 配置场景下的 pattern 命中条件和 pass 路由，保证目标融合实际进入图算。"
  diff: |
    1. 对比回归前后版本的 GraphKernel pass 路由，检查 `enable_cluster_ops`、`enable_allreduce_prologue_fusion` 等配置是否真正传入图编译。
    2. 修正 `Add+ReLU+ReLU`、`MatMul+AllReduce` 等 pattern 的匹配前置条件或 pass 执行顺序，避免被异构/并行路径提前改写掉。
    3. 继续保留 IR 计数型回归，但把断言绑定到明确的 fusion 名称和 O1 配置，便于后续快速定位“没进图算”而不是泛化成编译失败。
