kind: known_issue
id: accuracy-training-gbs-aux-loss-reset-missing
symptom: accuracy
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, accuracy, training, moe, gbs-aux-loss, qwen3]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(load_balancing_loss|avg_load_balancing_loss_value|gbs_aux_loss)"
description: |
  mindspore/org-issues#42153 reports that Qwen3-MoE `load_balancing_loss`
  exceeds the 0.01 threshold across several PP>1 generalized parallel
  strategies. The issue analysis identifies a concrete bug in the gbs_aux_loss
  path: when pipeline parallelism is enabled, not all PP domains execute
  `reset_accu_gbs_fi`, so the accumulated load-balancing statistics drift away
  from the baseline.
issue_refs:
  - issue_id: "42153"
    title: "[Bug]: qwen3-moe网络，多个泛化场景，与基线对比，load_balancing_loss误差超0.01"
    url: "https://gitcode.com/mindspore/org-issues/issues/42153"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Reset gbs_aux_loss accumulation on every PP domain before computing load-balancing statistics"
  diff: |
    --- a/mindformers/moe/load_balancing.py
    +++ b/mindformers/moe/load_balancing.py
    @@
    -if pp_stage == local_pp_stage:
    -    reset_accu_gbs_fi()
    +for pp_domain in all_pp_domains:
    +    reset_accu_gbs_fi(pp_domain)

    Notes:
    - Issue comments explicitly say the bug is that PP>1 scenes do not reset
      `accu_gbs_fi` across all PP domains.
    - The linked fix PR is `mindformers/pull/8136`.
