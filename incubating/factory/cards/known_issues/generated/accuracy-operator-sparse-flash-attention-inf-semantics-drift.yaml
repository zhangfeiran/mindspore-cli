kind: known_issue
id: accuracy-operator-sparse-flash-attention-inf-semantics-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-ops, mindspore-org-issues, accuracy, inf-semantics-drift, sparse-flash-attention]
occurrence_count: 1
affects_operators: [sparse-flash-attention]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42280 reports that `ops.sparse_flash_attention` fails
  when `sparse_block_size=128`. The issue comments say this is not a generic
  precision bug: after a CANN upgrade the workspace usage increased, while the
  backward interface itself does not support block size 128 and the hardware
  side cannot add a direct constraint. The agreed fix is to update the docs and
  testcase expectations for this unsupported scene.
issue_refs:
  - issue_id: "42280"
    title: "[Bug]: ops.sparse_flash_attention 当sparse_block_size 为128 时 用例执行报错E       RuntimeError: SyncStream failed, device info: Ascend_0"
    url: "https://gitcode.com/mindspore/org-issues/issues/42280"
    project: "mindspore/org-issues"
    component: "B-SIG-OPS"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Document the sparse_block_size=128 limitation and adjust the testcase accordingly"
  diff: |
    --- a/docs/api/sparse_flash_attention.md
    +++ b/docs/api/sparse_flash_attention.md
    @@
    +Note: backward path does not support `sparse_block_size=128`
    --- a/test_sparse_flash_attention.py
    +++ b/test_sparse_flash_attention.py
    @@
    -expect success for sparse_block_size=128
    +mark sparse_block_size=128 as unsupported
    Notes:
    - Issue comments explicitly say the fix is "文档补充及修改用例".
    - The linked framework-side PRs are #91991 and #92272.
