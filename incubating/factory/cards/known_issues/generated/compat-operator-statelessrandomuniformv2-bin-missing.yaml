kind: known_issue
id: compat-operator-statelessrandomuniformv2-bin-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, msadapter, random, bin-missing]
occurrence_count: 1
affects_operators: [statelessrandomuniformv2]
affects_platforms: [ascend]
detection:
  pattern: "(aclnnInplaceUniform failed|Op StatelessRandomUniformV2 does not has any binary)"
description: |
  mindspore/org-issues#42281 is not an AMP semantic bug by itself. The public
  trace shows `torch.rand` on the msadapter path eventually dispatching
  `StatelessRandomUniformV2`, and ACLNN fails because that random op binary is
  missing on the tested environment.
issue_refs:
  - issue_id: "42281"
    title: "[Bug]: 检查 amp.autocast 设置的 dtype=torch.float16报错RuntimeError: Call aclnnInplaceUniform failed, detail:EZ9999: Inner Error!"
    url: "https://gitcode.com/mindspore/org-issues/issues/42281"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Register or package `StatelessRandomUniformV2` for the msadapter random path"
  diff: |
    --- a/cann/op_info/stateless_random_uniform_v2.json
    +++ b/cann/op_info/stateless_random_uniform_v2.json
    @@
    -supported_bins: []
    +supported_bins:
    +  - StatelessRandomUniformV2
