kind: known_issue
id: function-operator-flash-attention-value-reshape-uses-key
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-mindformers-train, mindspore-mindformers, flash-attention, arg-mapping]
occurrence_count: 1
affects_operators: [flash-attention]
affects_platforms: [ascend]
detection:
  pattern: "(flash attention.*value.*reshape.*key|reshape入参为key)"
description: |
  mindspore/mindformers#2211 reports a direct variable wiring bug in the flash
  attention module: the branch reshaping `value` accidentally uses `key` as the
  input tensor in both graph and pynative paths. This is a wrong-argument bug,
  not a generic mapping issue.
issue_refs:
  - issue_id: "2211"
    title: "[Bug]: 静态图和动态图flash attention对value进行reshape入参为key"
    url: "https://gitcode.com/mindspore/mindformers/issues/2211"
    project: "mindspore/mindformers"
    component: "B-SIG-MindFormers-Train"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "Use `value` rather than `key` when reshaping the V branch"
  diff: |
    --- a/mindformers/modules/flash_attention.py
    +++ b/mindformers/modules/flash_attention.py
    @@
    -value = self.reshape(key, value_shape)
    +value = self.reshape(value, value_shape)
