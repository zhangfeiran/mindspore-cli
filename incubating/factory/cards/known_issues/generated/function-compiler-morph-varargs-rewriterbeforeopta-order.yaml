kind: known_issue
id: function-compiler-morph-varargs-rewriterbeforeopta-order
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-compiler, mindspore-org-issues, compiler, morph, varargs, kwargs, rewriterbeforeopta]
occurrence_count: 1
affects_platforms: [cpu]
detection:
  pattern: "(Morph|make_keyword_arg|extract_keyword_arg|\\*args|\\*\\*kwargs)"
description: |
  `ops.Morph` can fail during grad compilation when the wrapped function uses
  `*args` or `**kwargs`. The Morph expansion happens after `RewriterBeforeOptA`,
  so `make_keyword_arg/extract_keyword_arg` nodes survive and later receive
  FakeBprop handling.
issue_refs:
  - issue_id: "42145"
    title: "[Bug]: Morph内部调用的函数包含*args, **kwargs入参时报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42145"
    project: "mindspore/org-issues"
    component: "B-SIG-Compiler"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Run `RewriterBeforeOptA` again after Morph expansion so keyword-arg helper nodes are cleaned before grad lowering."
  diff: |
    1. Keep the existing early `RewriterBeforeOptA` cleanup for normal
       front-end graphs.
    2. After Morph expansion, rerun `RewriterBeforeOptA` so newly introduced
       `make_keyword_arg/extract_keyword_arg` nodes are eliminated.
    3. Add regression coverage for Morph functions that call helpers with
       keyword-only parameters and varargs under grad/JIT.
