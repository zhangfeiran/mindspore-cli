kind: known_issue
id: failure-runtime-mindformers-is-legacy-model-registry-split
symptom: failure
severity: critical
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, mindformers, is_legacy_model, registry, config]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(is_legacy_model\\(\\)逻辑变更导致用例批量报错|cpu_offloading|Can't find class type config)"
description: |
  MindFormers 中 `is_legacy_model()` 逻辑变更后，legacy/non-legacy 分支选择与现有配置、注册表和并行配置字段不再兼容，
  直接导致批量用例报错。

  已知触发样例来自 issue `42168`：`TransformerOpParallelConfig` 缺少 `cpu_offloading` 字段，
  同时 `MindFormerRegister` 在 `use_legacy=False` 下找不到已有配置类。
issue_refs:
  - issue_id: "42168"
    title: "[Bug]: 【MindFormers】【B版本】is_legacy_model()逻辑变更导致用例批量报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42168"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
fix:
  summary: "统一 `is_legacy_model()` 分支判断与配置字段、注册表内容，避免一刀切切换后批量断裂。"
  diff: |
    1. 对齐 `legacy` 与 `non-legacy` 两套分支各自依赖的 parallel config 字段，避免在错误分支访问不存在属性。
    2. 修正 `MindFormerRegister` 的查找逻辑，让现有 `config`/model 类在对应 `use_legacy` 模式下都可命中。
    3. 为 `LayerSetting` 和注册表查询补回归，确保 `is_legacy_model()` 改动不会再引发批量 case 失效。
