kind: known_issue
id: accuracy-operator-cos-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, cos]
occurrence_count: 1
affects_operators: [cos]
affects_platforms: [cpu, ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42131 reports a complex64/complex128 accuracy failure
  for `Cos` on CPU/Ascend. The root-cause comment states this is not an
  operator precision bug. The benchmark testcase was written incorrectly and
  introduced an unnecessary conjugate in the comparison path, which caused the
  mismatch against the framework output.
issue_refs:
  - issue_id: "42131"
    title: "[Bug]: cos算子复数类型complex64/complex128精度异常"
    url: "https://gitcode.com/mindspore/org-issues/issues/42131"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU,Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Remove the extra conjugate from the complex cos testcase instead of changing the operator"
  diff: |
    --- a/test_cos.py
    +++ b/test_cos.py
    @@ benchmark path for complex64/complex128
    -expected = np.conjugate(expected)
    +expected = expected
    Notes:
    - Issue comment explicitly says "测试用例写错了，与开发沟通后确认需要删掉此处的共轭".
    - The operator precision is normal; only the testcase benchmark logic
      needs to be corrected.
