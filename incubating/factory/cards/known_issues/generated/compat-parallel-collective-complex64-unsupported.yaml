kind: known_issue
id: compat-parallel-collective-complex64-unsupported
symptom: failure
severity: critical
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, allgather, allreduce, complex64, collective, ascend]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(AllReduce].*Tensor\\[Complex64\\]|not support.*complex64|AllGather)"
description: |
  分布式通信算子在 Ascend 上当前不支持 `complex64` 输入，典型表现为 `AllGather`/`AllReduce`
  等 collectives 在图编译阶段直接报类型校验错误。

  已知触发样例来自 issue `42155`：连续调用 `AllGather` 处理 `np.complex64` 输入时，框架抛出
  `For primitive[AllReduce] ... but got Tensor[Complex64]`。
issue_refs:
  - issue_id: "42155"
    title: "[Bug]: allgather InnerCommAllReduce 等通信报错，不支持complex64"
    url: "https://gitcode.com/mindspore/org-issues/issues/42155"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
fix:
  summary: "在通信算子能力未补齐前，前端需明确拦截 complex64 collective 输入，并给出可读能力边界。"
  diff: |
    1. 在 `AllGather`、`AllReduce` 等 collective 前端校验层显式声明 `complex64/complex128` 不受支持，避免用户误以为是随机运行时失败。
    2. 如果底层 HCCL/CANN 后续具备复数通信能力，再同步补 dtype 白名单和覆盖用例。
    3. 为当前不支持场景补一致的报错文案和功能回归，确保所有通信算子都表现为同一类明确错误。
