kind: known_issue
id: accuracy-operator-baddbmm-dtype-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, dtype-drift, baddbmm]
occurrence_count: 1
affects_operators: [baddbmm]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42253 reports fp16/fp32 `mint.baddbmm` mismatches on
  Ascend, including dynamic-shape scenes. The issue comments attribute this to
  the same CANN-side input-mutation bug seen in other `baddbmm` paths:
  `input0` is multiplied by `beta` in place, so the benchmark side reuses
  polluted input data and reports a false mismatch.
issue_refs:
  - issue_id: "42253"
    title: "[Bug]: mint.baddbmm fp16\fp32 ascend后端计算结果与标杆不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42253"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Clone the benchmark inputs and use the CANN build containing DTS2026031620929"
  diff: |
    --- a/mint_f_baddbmm.py
    +++ b/mint_f_baddbmm.py
    @@ benchmark path
    -torch_input = ms_input
    +torch_input = ms_input.copy()
    Notes:
    - Issue comments say `input0` is mutated in place during the affected
      backend path.
    - The backend-side fix is tracked by DTS2026031620929; the testcase-side
      protection is to avoid reusing the mutated buffer.
