kind: known_issue
id: accuracy-operator-baddbmm-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, baddbmm]
occurrence_count: 1
affects_operators: [baddbmm]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42228 reports an apparent Ascend `baddbmm` precision
  failure. The issue discussion says the MindSpore result itself is correct;
  the mismatch comes from a CANN-side bug where executing `tensor.baddbmm`
  mutates the input tensor in place during the beta multiply path. The testcase
  then reuses the mutated input to compute the torch benchmark, so the
  reference result is polluted and the case is misreported as an operator
  precision problem.
issue_refs:
  - issue_id: "42228"
    title: "[Bug]: ops.baddbmm存在精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42228"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Avoid reusing the mutated input in the benchmark path and upgrade CANN to a version with the baddbmm input-mutation bug fixed"
  diff: |
    --- a/f_baddbmm.py
    +++ b/f_baddbmm.py
    @@ benchmark preparation
    -torch_input = ms_input
    +torch_input = ms_input.copy()
    Notes:
    - Issue comments state that `tensor.baddbmm` may modify input0 in place on
      the affected CANN stack, so the torch benchmark must not reuse the same
      buffer after the MindSpore call.
    - The long-term fix is to upgrade CANN; the short-term testcase fix is to
      clone/copy inputs before passing them to the benchmark path.
