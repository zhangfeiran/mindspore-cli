fix:
  summary: "Use a stabilized later checkpoint for cross-hardware comparison instead of judging drift from an early unstable stage"
  diff: |
    Public issue comments do not provide a framework source patch.

    Extracted handling guidance:
    - do not compare different hardware shapes from the very first unstable
      training steps
    - save a later checkpoint, such as the 1000-step checkpoint mentioned in
      the issue discussion, and resume from there for alignment
    - use the stabilized checkpoint as the baseline for cross-shape precision
      validation
