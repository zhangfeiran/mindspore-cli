description: |
  mindspore/org-issues#42211 reports that TeleChat3-36B training loss differs
  between 910B4 test machines and the development baseline. The issue comments
  do not point to a framework code defect. Instead, they conclude that early
  training is numerically unstable across different hardware shapes, and the
  recommended comparison method is to save a later checkpoint and compare from
  that stabilized state.
issue_refs:
