kind: known_issue
id: accuracy-operator-dsa-indexer-loss-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, accuracy, precision-drift, dsa-indexer-loss]
occurrence_count: 1
affects_operators: [dsa-indexer-loss]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42363 reports a divide-by-zero risk in
  `dsa_indexer_loss.py`. The issue comments point to the exact expression:
  `self.div(attention_scores, self.sum2(attention_scores, -1, keepdim=True))`.
  When the denominator sum becomes zero, the computation can trigger division by
  zero. The fix adds a small value that does not affect normal accuracy.
issue_refs:
  - issue_id: "42363"
    title: "[Bug]: 【MindFormers】【安全】【除零错误】dsa_indexer_loss.py文件存在除零错误风险"
    url: "https://gitcode.com/mindspore/org-issues/issues/42363"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Add a small epsilon to the DSA indexer loss denominator to avoid division by zero"
  diff: |
    --- a/dsa_indexer_loss.py
    +++ b/dsa_indexer_loss.py
    @@
    -norm_scores = self.div(attention_scores, self.sum2(attention_scores, -1, keepdim=True))
    +denom = self.sum2(attention_scores, -1, keepdim=True) + eps
    +norm_scores = self.div(attention_scores, denom)
    Notes:
    - Issue comments identify the exact risky line and say the fix is to add a
      value that does not affect normal precision.
    - The referenced MindFormers change is PR #8148.
