kind: known_issue
id: function-runtime-moe-sharedexpert-return-contract-mismatch
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-mindformers-train, mindspore-mindformers, moe, interface-contract]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(MoELayer|SharedExpertMLP|返回参数|接收参数不一致)"
description: |
  mindspore/mindformers#2212 reports a direct caller-callee contract break in
  the MoE stack: `MoELayer` and `SharedExpertMLP` do not agree on the returned
  value structure, so the forward path crashes when the caller unpacks outputs.
issue_refs:
  - issue_id: "2212"
    title: "[Bug]: moe layer中，类MoELayer和类SharedExpertMLP使用时返回参数与使用时接收参数不一致导致报错"
    url: "https://gitcode.com/mindspore/mindformers/issues/2212"
    project: "mindspore/mindformers"
    component: "B-SIG-MindFormers-Train"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "Align the MoE return tuple with the caller's expected unpacking contract"
  diff: |
    --- a/mindformers/modules/moe/moe_layer.py
    +++ b/mindformers/modules/moe/moe_layer.py
    @@
    -return expert_output
    +return expert_output, aux_loss
    --- a/mindformers/modules/moe/shared_expert.py
    +++ b/mindformers/modules/moe/shared_expert.py
    @@
    -hidden_states = self.shared_expert(...)
    +hidden_states, aux_loss = self.shared_expert(...)
