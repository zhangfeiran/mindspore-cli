confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, triton, randint, all-zero, random]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(random算子.*输出结果为全0|tl\\.randint|TRITON_BACKEND.*mindspore)"
description: |
  Triton Ascend 对接 MindSpore 后端时，`tl.randint` 随机数路径可能直接产出全 0 结果，而对标的 torch 路径输出正常随机值。
issue_refs:
  - issue_id: "42276"
    title: "[Bug]: Triton_ascend对接mindspore后端问题。"
    url: "https://gitcode.com/mindspore/org-issues/issues/42276"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "修正 Triton MindSpore 后端对 `tl.randint` 的随机数实现或 seed 传递，避免随机张量被错误清零。"
  diff: |
    1. 检查 `tl.randint(seed, offset)` 在 MindSpore 后端上的 lowering 和 seed/offset 传递是否丢失。
    2. 与 torch 对标同一 seed、同一 shape 的输出分布，确认问题是全零硬错误而非统计漂移。
    3. 为 Triton random kernel 补最小回归，覆盖 `const_seed=True/False` 两类路径。
