detection:
  pattern: "(deepseek.*mhc.*triton.*seq_length:4k.*loss有多个突刺|TRITON_BACKEND=mindspore)"
description: |
  `DeepSeek` 训练在走 `MHC` 流程、开启 `TRITON_BACKEND=mindspore` 且 `seq_length=4096` 时，
  与基线相比会出现多个 loss spike，而不是平滑下降。

  issue 中的环境组合还同时开启了 `GroupedMatmul` 相关 GraphKernel 聚类与在线调优，
  说明问题大概率与 `MHC + Triton + grouped matmul` 这组训练路径交互有关。
issue_refs:
  - issue_id: "42423"
    title: "[Bug]: deepseek网络，走mhc流程，使能tirton，seq_length:4k，网络训练，多个场景，与基线相比，loss有多个突刺"
    url: "https://gitcode.com/mindspore/org-issues/issues/42423"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "围绕 `DeepSeek + MHC + Triton + seq4k` 训练路径排查首个偏离 step，定位是 Triton/GraphKernel 还是优化器交互导致的 loss spike。"
  diff: |
    1. 固定 issue 中的启动环境与 `deepseek3_poc_30b.yaml` 配置，先确认 loss spike 是否只在 `TRITON_BACKEND=mindspore` 场景稳定复现。
    2. 对比关闭 Triton、关闭 `grouped_matmul_assignadd_fusion`、关闭在线调优后的 loss 曲线，缩小到具体的数值漂移来源。
    3. 对首个 spike step 抓关键层输出、梯度和优化器状态，避免把这类专项训练漂移继续挂在泛化 loss 卡下面。
