kind: known_issue
id: failure-parallel-mfpipeline-lossscale-attention-variant-none
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, mfpipelinewithlossscalecell, attention-variant, none]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(MFPipelineWithLossScaleCell.*experimental_attention_variant|NoneType)"
description: |
  `MFPipelineWithLossScaleCell` 在构造或运行时假定 attention variant 一定存在，
  但实际拿到 `None` 后直接访问 `experimental_attention_variant`，触发属性错误。
issue_refs:
  - issue_id: "42332"
    title: "[Bug]: 【MindFormers】【冒烟】MindFormers MFPipelineWithLossScaleCell接口报错AttributeError: MFPipelineWithLossScaleCell: 'NoneType' object has no attribute 'experimental_attention_variant'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42332"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "给 `MFPipelineWithLossScaleCell` 增加 attention variant 空值保护和默认分支。"
  diff: |
    1. 在读取 `experimental_attention_variant` 前检查对象是否存在。
    2. 对未配置该能力的模型走默认路径，而不是直接属性访问。
    3. 为 MFPipeline 构造与启动场景补空值回归。
