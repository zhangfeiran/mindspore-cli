kind: known_issue
id: failure-profiler-trace-view-missing-mindspore-to-mstx
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-visualization, mindspore-org-issues, profiler, mstx, trace_view, timeline]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(trace_view\\.json.*缺少mindspore_to_mstx|check_mstx_dot\\(python_to_device=True\\)|mstx打点)"
description: |
  开启 profiler 的 MSTX 打点功能后，生成的 `trace_view.json` 缺少 `mindspore_to_mstx` 关联值，
  导致时间线校验失败。
issue_refs:
  - issue_id: "42417"
    title: "[Bug]: 开启profiler的mstx打点功能，解析生成的trace_view.json文件不符合预期，缺少mindspore_to_mstx值"
    url: "https://gitcode.com/mindspore/org-issues/issues/42417"
    project: "mindspore/org-issues"
    component: "B-SIG-Visualization"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "修正 profiler 轻量化打点到 `trace_view.json` 的映射关系，确保 `mindspore_to_mstx` 字段稳定生成。"
  diff: |
    1. 检查 MSTX 打点开启后，timeline 生成链路中 `mindspore_to_mstx` 的写入时机和字段名。
    2. 确保 `trace_view.json` 在解析前已包含 `python_to_device` 相关轻量打点映射。
    3. 为 `check_mstx_dot(python_to_device=True)` 补专项回归，避免 visualization 能力回归。
