kind: known_issue
id: accuracy-operator-histogram-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, histogram]
occurrence_count: 1
affects_operators: [histogram]
affects_platforms: [ascend]
detection:
  pattern: "np\\.histogram"
description: |
  mindspore/org-issues#42302 reports that `np.histogram` produces a mismatched
  result in O1 mode when `a` and `weights` are lists and `density=False`.
  The issue comment attributes the regression to an O1 graph-fusion adaptation
  gap introduced after `equal` started to support mixed-precision inputs
  without the previous implicit cast. This is an O1 adaptation issue rather
  than a raw histogram numeric-kernel defect.
issue_refs:
  - issue_id: "42302"
    title: "[Bug]: O1模式下 np.histogram, input a and weights are list and density is False，计算结果对不上"
    url: "https://gitcode.com/mindspore/org-issues/issues/42302"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Adapt the O1 graph-fusion path for the mixed-precision equal behavior instead of patching histogram math directly"
  diff: |
    --- a/frontend/optimizer/o1_fusion/equal_fusion_pass.cc
    +++ b/frontend/optimizer/o1_fusion/equal_fusion_pass.cc
    @@
    -// O1 path assumes the old implicit cast behavior
    +// adapt O1 fusion to the new mixed-precision equal semantics
    Notes:
    - Issue comment says the root cause is that `equal` now supports mixed
      precision and the frontend no longer inserts the old implicit cast.
    - The fix was to adapt the O1 graph-fusion path; the issue references
      framework PR #91980.
