kind: known_issue
id: failure-profiler-framework-dir-empty-dump-missing
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, profiler, framework, dump-missing]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(FRAMEWORK下数据为空|FRAMEWORK.*缺少相应数据|profiler)"
description: |
  开启 profiler 后，落盘目录中的 `FRAMEWORK` 子目录为空或缺少预期文件，说明框架侧采集数据没有正确写出，
  而不是仅仅解析脚本出错。
issue_refs:
  - issue_id: "41912"
    title: "[BUG]：开启profiler，落盘目录FRAMEWORK下数据为空，缺少相应数据"
    url: "https://gitcode.com/mindspore/org-issues/issues/41912"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "排查 profiler 框架侧采集与落盘链路，确保 `FRAMEWORK` 目录在 Ascend 场景下能实际写出元数据。"
  diff: |
    1. 区分“采集没发生”和“采集发生但路径/权限错误”两类问题，优先检查框架事件是否真正被记录。
    2. 校验 `FRAMEWORK` 路径创建、权限和多 rank 落盘逻辑，避免目录创建成功但文件未写出。
    3. 为 profiler 落盘结果补目录非空回归，避免再次只看到空目录。
