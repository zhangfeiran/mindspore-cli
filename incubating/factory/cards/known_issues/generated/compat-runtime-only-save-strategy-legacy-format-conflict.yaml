kind: known_issue
id: compat-runtime-only-save-strategy-legacy-format-conflict
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, checkpoint, strategy, legacy-format]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(only_save_strategy is not supported when the use_legacy_format is False|test_model_runner)"
description: |
  `only_save_strategy` 与 `use_legacy_format=False` 组合本身不兼容。如果测试或配置同时启用了这两个选项，
  运行时会直接抛出参数冲突错误。

  已知触发样例来自 issue `42333`：MindFormers `test_model_runner` 用例在 master 分支上报
  `ValueError: only_save_strategy is not supported when the use_legacy_format is False.`。
issue_refs:
  - issue_id: "42333"
    title: "[Bug]: 【自提单】【Mindformers】测试用例test_model_runner下报错：ValueError: only_save_strategy is not supported when the use_legacy_format is False."
    url: "https://gitcode.com/mindspore/org-issues/issues/42333"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "在配置校验阶段明确拦截 `only_save_strategy` 与非 legacy checkpoint 格式的冲突组合。"
  diff: |
    1. 在 checkpoint/save strategy 配置解析层增加互斥校验，禁止 `only_save_strategy=True` 与 `use_legacy_format=False` 同时出现。
    2. 对默认配置和测试样例做对齐，避免新格式路径继续沿用旧格式专属选项。
    3. 为 `test_model_runner` 这类入口补回归，确保错误稳定暴露在配置层而不是运行半程后才失败。
