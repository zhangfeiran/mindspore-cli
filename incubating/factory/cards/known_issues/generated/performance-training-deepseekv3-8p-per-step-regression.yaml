fix:
  summary: "以固定 8P 配置复现 DeepSeekV3 step time 劣化，优先排查 CANN 9.0/HDK 26.0 组合下的训练执行路径变化。"
  diff: |
    1. 固定 `910B + HDK 26.0.rc1.b020 + CANN 9.0.0.B020 + master@361ce615` 的 8P 减层训练配置，确认问题稳定复现。
    2. 对比问题前后的 kernel 路由、图编译开关和通信/重计算配置，定位 `per_step_time` 从 `90ms` 到 `116ms` 的主要增量。
    3. 将修复或规避策略绑定到 `DeepSeekV3 8P` 这条专用性能基线，避免继续混在泛化的“训练性能劣化”桶里。
