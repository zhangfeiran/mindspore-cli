affects_platforms: [cpu]
detection:
  pattern: "(SetData.*Data内存地址也被释放.*实际Data释放失败|2222222222: .*e\\+18)"
description: |
  MindSpore Lite C++ 推理接口在 `SetData`/`MutableData` 使用场景下，如果模型对象释放后调用方仍持有输入 tensor 的数据指针，
  会读到悬空地址上的随机值，暴露出生命周期契约不清或释放时机异常。

  issue `42340` 中删除 `model` 后再次读取 `inData[0]`，得到的是随机大值而不是稳定的已释放状态。
issue_refs:
  - issue_id: "42340"
    title: "[Bug]: linux_x86_64_cpu环境，自定义算子C++接口，SetData，推理后释放model，预期Data内存地址也被释放，实际Data释放失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42340"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "closed"
fix:
  summary: "明确 Lite C++ API 中输入输出 tensor 数据指针的所有权和生命周期，避免释放 model 后继续暴露悬空地址。"
  diff: |
    1. 检查 `Model::GetInputs()`、`MutableData()` 和 `Data()` 返回的底层 buffer 所有权，确认由 model 管理还是由调用方管理。
    2. 若 model 析构时会释放底层 buffer，则 API 文档和示例必须明确禁止析构后继续访问旧指针；若不会释放，则补齐释放路径。
    3. 为 `delete model` 后的 tensor 指针访问补可靠性回归，防止同类悬空指针问题再次出现。
