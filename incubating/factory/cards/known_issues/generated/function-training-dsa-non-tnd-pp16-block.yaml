kind: known_issue
id: function-training-dsa-non-tnd-pp16-block
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, training, dsa, tnd, pp]
occurrence_count: 1
affects_operators: [dsa]
affects_platforms: [ascend]
detection:
  pattern: "(DSA特性.*不开启tnd模式.*pp设置到16|训练任务拉起报错)"
description: |
  mindspore/org-issues#42338 reports a specific unsupported launch combination:
  DSA with TND disabled and pipeline parallel set to 16. This should be blocked
  by configuration validation instead of failing during task startup.
issue_refs:
  - issue_id: "42338"
    title: "[Bug]: [B050][AR20260112650675]DSA特性，不开启tnd模式，pp设置到16,训练任务拉起报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42338"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Fail fast on the unsupported `DSA + non-TND + PP16` combination"
  diff: |
    --- a/mindformers/experimental/dsa/validator.py
    +++ b/mindformers/experimental/dsa/validator.py
    @@
    +if not cfg.enable_tnd and cfg.pipeline_model_parallel_size >= 16:
    +    raise ValueError("DSA requires TND mode when pipeline parallel size is 16 or larger.")
