kind: known_issue
id: function-runtime-lite-ascend-custom-path-conflict
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-innerdelivery, mindspore-mindspore-lite, mindir, lite, ascend, env]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(ascend_version_file|ASCEND_CUSTOM_PATH|ASCEND_HOME_PATH)"
description: |
  mindspore/mindspore-lite#217 reports that Lite 2.8.0 Python inference on a
  MINDIR model fails with `no attribute 'ascend_version_file'` because the
  runtime uses `ASCEND_CUSTOM_PATH=/usr/local/Ascend` from the container
  environment and mistakes it for the CANN version path. The issue discussion
  explicitly identifies the conflict between `ASCEND_CUSTOM_PATH` and the real
  CANN path carried by `ASCEND_HOME_PATH`.
issue_refs:
  - issue_id: "217"
    title: "[Bug]: 基于官网mindspore_lite 2.8.0 python API包执行FireRedASR的mindir模型推理时报错no attribute 'ascend_version_file'"
    url: "https://gitcode.com/mindspore/mindspore-lite/issues/217"
    project: "mindspore/mindspore-lite"
    component: "B-SIG-InnerDelivery"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "Use the real CANN home path instead of treating `ASCEND_CUSTOM_PATH` as the Lite version-file root"
  diff: |
    --- a/mindspore_lite/python/_check_ascend.py
    +++ b/mindspore_lite/python/_check_ascend.py
    @@
    -version_root = os.getenv("ASCEND_CUSTOM_PATH")
    +version_root = os.getenv("ASCEND_HOME_PATH") or os.getenv("ASCEND_CUSTOM_PATH")

    Notes:
    - The issue report explicitly points to `ASCEND_CUSTOM_PATH=/usr/local/Ascend`
      causing the bad resolution.
    - Public comments link `mindspore-lite/pull/608` as the fix that shipped in 2.9.
