kind: known_issue
id: accuracy-operator-pow-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, pow]
occurrence_count: 1
affects_operators: [pow]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42298 reports a 910A `mint.pow` type-promotion mismatch
  against torch and 910B. The issue discussion closes it as a non-problem:
  910A precision is weaker for this scene, and the recommended handling is to
  adjust the testcase guarding standard rather than modify operator logic.
issue_refs:
  - issue_id: "42298"
    title: "[Bug]: [mint.pow]910A类型提升测试 pow(5,9) int16->int32,计算出来结果与torch和910B不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42298"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Relax the 910A testcase precision guard for this pow promotion scene"
  diff: |
    --- a/test_pow.py
    +++ b/test_pow.py
    @@
    -strict_precision_guard_for_910a()
    +looser_precision_guard_for_910a()
    Notes:
    - Issue comments explicitly say the fix is to "修改用例，修改精度看护标准".
