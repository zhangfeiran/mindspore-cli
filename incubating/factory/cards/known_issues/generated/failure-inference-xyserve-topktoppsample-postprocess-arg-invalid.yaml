detection:
  pattern: "(aclnnTopKTopPSample|do_sample.*top_k.*top_p.*temperature|XYServe)"
description: |
  `XYServe` 服务化推理在开启 `do_sample/top_k/top_p/temperature` 等后处理参数后，
  会在 `aclnnTopKTopPSample` 算子路径报错，说明服务请求参数与采样算子契约不一致。
issue_refs:
  - issue_id: "42366"
    title: "[Bug]: pangu 7b 300iduo XYServe服务化推理，配置后处理参数推理aclnnTopKTopPSample算子报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42366"
