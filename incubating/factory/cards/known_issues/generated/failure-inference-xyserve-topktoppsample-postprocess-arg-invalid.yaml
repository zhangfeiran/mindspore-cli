fix:
  summary: "对齐 XYServe 请求后处理参数与 `aclnnTopKTopPSample` 算子要求，避免采样参数直接触发推理失败。"
  diff: |
    1. 固定 issue 中的 `do_sample=True, top_k=5, top_p=0.85, temperature=1.1, max_new_tokens=1048` 配置复现问题。
    2. 检查服务层到算子层的采样参数映射、默认值和取值范围，防止非法组合直传给 `aclnnTopKTopPSample`。
    3. 为服务化推理的采样后处理参数补接口校验和回归测试。
