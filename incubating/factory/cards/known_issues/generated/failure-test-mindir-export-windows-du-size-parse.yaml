kind: known_issue
id: failure-test-mindir-export-windows-du-size-parse
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, test, windows, mindir, shell]
occurrence_count: 1
affects_platforms: [cpu]
detection:
  pattern: "(du -sh|list index out of range|test_mindir_export_over_2g)"
description: |
  mindspore/org-issues#42284 is a test portability problem, not a serializer
  core bug. The case validates exported variable size by shelling out to
  `du -sh` and then indexing the parsed output. On Windows that command path
  does not provide the expected token layout, so the assertion code throws
  `IndexError`.
issue_refs:
  - issue_id: "42284"
    title: "[Bug]: 第1个parameter超过1G不超过2G，导出MINDIR模型报错IndexError: list index out of range"
    url: "https://gitcode.com/mindspore/org-issues/issues/42284"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Replace shell-dependent size parsing with a cross-platform file size check"
  diff: |
    --- a/tests/st/export/test_mindir_export_over_2g.py
    +++ b/tests/st/export/test_mindir_export_over_2g.py
    @@
    -status, res = subprocess.getstatusoutput("du -sh ...")
    -assert 1.0 < float(res.split()[0][:-1]) < 3.0
    +data_file = next(Path(case_path, "test_0002_variables").glob("data_*"))
    +size_gb = data_file.stat().st_size / (1024 ** 3)
    +assert 1.0 < size_gb < 3.0
