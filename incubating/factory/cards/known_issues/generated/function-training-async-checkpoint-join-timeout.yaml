kind: known_issue
id: function-training-async-checkpoint-join-timeout
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, checkpoint, async-save, timeout]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(Timeout >7200\\.0s|asyn_save_ckpt|thread\\.join|CheckpointConfig\\(async_save=True\\))"
description: |
  mindspore/org-issues#42310 is a specific async-checkpoint scaling bug. A
  training case with very large parameters stalls in checkpoint save because the
  main thread waits unboundedly on the async save thread during `step_end`.
issue_refs:
  - issue_id: "42310"
    title: "[Bug]: 定义训练网络parameter足够大的net(Conv2dReduceMeanParam)，设置回调函数，调用model.train进行训练，报错Timeout >7200.0s"
    url: "https://gitcode.com/mindspore/org-issues/issues/42310"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Avoid blocking training step teardown on oversized async checkpoint joins"
  diff: |
    --- a/mindspore/train/serialization.py
    +++ b/mindspore/train/serialization.py
    @@
    -thread.join()
    +thread.join(timeout=ASYNC_CKPT_WAIT_TIMEOUT)
    +if thread.is_alive():
    +    raise TimeoutError("async checkpoint save timeout")
