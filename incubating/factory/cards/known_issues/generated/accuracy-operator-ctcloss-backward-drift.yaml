kind: known_issue
id: accuracy-operator-ctcloss-backward-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, backward-drift, ctcloss]
occurrence_count: 1
affects_operators: [ctcloss]
affects_platforms: [ascend, cpu]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42421 reports `nn.CTCLoss` backward precision problems
  plus ValueError/RuntimeError failures. The issue analysis points to a recent
  framework change that removed 8-byte alignment padding for `log_alpha` on
  Ascend, which directly caused the precision regression.
issue_refs:
  - issue_id: "42421"
    title: "[Bug]: nn.CTCLoss 反向精度存在问题，并存在报错ValueError和RuntimeError"
    url: "https://gitcode.com/mindspore/org-issues/issues/42421"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend,CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Restore the Ascend log_alpha alignment behavior by reverting the offending PR and moving the fuzz fix into C++"
  diff: |
    --- a/ctc_loss.py
    +++ b/ctc_loss.cc
    @@
    -remove Ascend log_alpha 8-byte alignment padding
    +restore log_alpha alignment padding and keep fuzz exception handling in C++
    Notes:
    - Issue comment explicitly says the problem was introduced after removing
      Ascend-side `log_alpha` 8-byte alignment padding.
    - The same comment recommends reverting PR #92282 and moving the fuzz fix
      into the C++ implementation instead of Python.
