kind: known_issue
id: accuracy-operator-reversesequence-dtype-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, dtype-drift, reversesequence]
occurrence_count: 1
affects_operators: [reversesequence]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#41906 reports fp64/fp16 accuracy failures for
  `ReverseSequence`. The discussion attributes this to a custom AICPU operator
  path that did not register infer correctly, and a later CANN change exposed
  the problem. The proposed fix is to remove the custom operator path and use
  the built-in operator implementation.
issue_refs:
  - issue_id: "41906"
    title: "[Bug]:reversesequence fp64、fp16存在精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/41906"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Drop the custom ReverseSequence AICPU operator and switch to the built-in implementation"
  diff: |
    --- a/plugin/device/ascend/kernel/aicpu/custom/reversesequence_custom.cc
    +++ b/plugin/device/ascend/kernel/aicpu/custom/reversesequence_custom.cc
    @@
    -register custom ReverseSequence path
    +use built-in ReverseSequence operator path
    Notes:
    - Issue comment says "去掉自定义算子，切换成内置算子".
    - The root cause is missing infer registration in the custom AICPU path.
