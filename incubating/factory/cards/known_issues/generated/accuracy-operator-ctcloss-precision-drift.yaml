kind: known_issue
id: accuracy-operator-ctcloss-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, ctcloss]
occurrence_count: 1
affects_operators: [ctcloss]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42355 is not a standalone `CTCLoss` algorithm bug.
  The discussion identifies a version compatibility mismatch:
  MindSpore 2.9.0.b010 is not compatible with the older
  `milan_c22_20250724` CANN package for this operator. CANN C23 changed the
  infershape value and MindSpore adjusted accordingly, so using the old C22
  stack with this MindSpore build leads to the reported forward precision
  anomaly.
issue_refs:
  - issue_id: "42355"
    title: "[Bug]: [兼容性测试]:ctcloss报错910B正向精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42355"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Use a matched MindSpore/CANN version pair for CTCLoss instead of patching the operator"
  diff: |
    --- a/env/compat_matrix.md
    +++ b/env/compat_matrix.md
    @@
    -MindSpore 2.9.0.b010 + CANN milan_c22_20250724
    +MindSpore 2.9.0.b010 + CANN C23 or newer
    Notes:
    - Issue comments explicitly say the recommended workaround is to use
      MindSpore 2.9.0.b010 with CANN C23 or above.
    - The related framework-side compatibility adjustment is referenced in
      PR #89635.
