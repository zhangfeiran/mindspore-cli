kind: known_issue
id: failure-parallel-hyper-parallel-module-missing
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, hyper_parallel, import, module-missing]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(No module named 'hyper_parallel'|load_parallel_checkpoint|通信重排)"
description: |
  部分并行/通信重排用例在不应依赖动态图能力的场景下，错误导入了 `hyper_parallel` 模块，
  直接触发 `ModuleNotFoundError`。
issue_refs:
  - issue_id: "42265"
    title: "[Bug]: B050版本全量，不需要使用动态图的用例，报ModuleNotFoundError: No module named 'hyper_parallel'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42265"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
fix:
  summary: "收敛并行功能的模块依赖边界，避免静态/非动态图场景误依赖 `hyper_parallel`。"
  diff: |
    1. 检查 `load_parallel_checkpoint`、通信重排或相关入口是否无条件导入 `hyper_parallel`。
    2. 为仅动态图可用的模块增加延迟导入或能力判断。
    3. 为不依赖动态图的并行 case 补 import 边界回归。
