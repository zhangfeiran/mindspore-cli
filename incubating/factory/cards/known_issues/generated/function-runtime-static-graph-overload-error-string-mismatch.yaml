kind: known_issue
id: function-runtime-static-graph-overload-error-string-mismatch
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, static-graph, overload, error-message]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(match failed because incorrect keyword name|missing 1 required argument|Failed calling less)"
description: |
  mindspore/org-issues#42278 is a static-graph error reporting regression.
  Single-overload tensor APIs such as `Tensor.less` now return a generic
  overload banner, so tests that expect the precise cause
  (`incorrect keyword name`, `missing 1 required argument`) no longer match.
issue_refs:
  - issue_id: "42278"
    title: "[Bug]: 静态图算子api报错信息优化。有效重载==1,多余的k-v参数，传入未知参数名，查看报错结果跟预期不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42278"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Preserve the specific parser failure reason when there is only one valid overload"
  diff: |
    --- a/mindspore/python/mindspore/_extends/parse/standard_method.py
    +++ b/mindspore/python/mindspore/_extends/parse/standard_method.py
    @@
    -raise TypeError(format_overload_banner(name, signatures))
    +raise TypeError(build_precise_call_error(name, signatures, mismatch_reason))
