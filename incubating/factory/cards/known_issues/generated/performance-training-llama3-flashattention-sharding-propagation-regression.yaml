fix:
  summary: "对齐 `flash_attention + sharding_propagation` 组合在新版本栈上的策略传播和执行路径，恢复 Llama3 8B 训练吞吐。"
  diff: |
    1. 固定 `use_flash_attention=True` 与 `parallel.search_mode=sharding_propagation` 的 8 卡配置，确认性能劣化只在该组合下出现。
    2. 对比新旧版本在策略传播、切分结果和 FlashAttention kernel 命中上的差异，定位 step 时间整体抬升的根因。
    3. 为 `flash_attention + sharding_propagation` 组合补独立性能回归，避免仅用普通 Llama3 训练基线掩盖问题。
