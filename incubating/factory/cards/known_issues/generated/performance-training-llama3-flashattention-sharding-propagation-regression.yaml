description: |
  `Llama3 8B` 在开启 `use_flash_attention=True` 后，再切到 `sharding_propagation` 策略传播算法，
  训练性能出现系统性劣化；各 step 时间均明显高于预期。

  issue 同时给出了失败和成功版本：失败组合为 `CANN_9.0.0/20260129 + mindspore cb3bff94 + mindformers 0f1b918e49`，
  对应成功组合为 `CANN_8.5.0/20260105 + mindspore 09aa7b710c + mindformers 8ccc49b3`。
issue_refs:
