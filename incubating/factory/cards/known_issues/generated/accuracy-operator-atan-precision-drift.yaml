kind: known_issue
id: accuracy-operator-atan-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, atan]
occurrence_count: 1
affects_operators: [atan]
affects_platforms: [cpu]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42194 reports an apparent accuracy failure for CPU
  `Atan` on complex64/complex128 inputs in the component test repository.
  The operator implementation was not the root cause. The issue analysis
  states that the testcase used overly strict tolerance for complex inputs,
  so normal floating-point variation was misclassified as an operator
  precision regression.
issue_refs:
  - issue_id: "42194"
    title: "[Bug]: CPU后端atan算子精度异常"
    url: "https://gitcode.com/mindspore/org-issues/issues/42194"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Relax the complex atan testcase tolerance instead of changing the operator implementation"
  diff: |
    --- a/test_atan.py
    +++ b/test_atan.py
    @@
    -fact.loss = 1e-6
    +fact.loss = 1e-4   # complex64 tolerance
    @@
    -fact.loss = 1e-6
    +fact.loss = 1e-5   # complex128 tolerance
    Notes:
    - Issue comment says the complex64/complex128 loss thresholds in the test
      repo were set too aggressively.
    - The fix is to adjust testcase tolerance, not to patch the CPU atan kernel.
