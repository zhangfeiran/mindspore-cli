kind: known_issue
id: accuracy-model-diffusers-scheduler-regression
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-mdtest, mindspore-org-issues, accuracy, model, diffusers, scheduler]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "DPMSolverSDEScheduler"
description: |
  mindspore/org-issues#42290 reports a MindOne diffusers
  `DPMSolverSDEScheduler` accuracy regression. The issue discussion says the
  scheduler equations were not the direct root cause. The real problem was an
  `== / eq` overload change: when both inputs are float64 and the right-hand
  side is a scalar Tensor, the scalar Tensor was implicitly converted to a
  plain scalar and lost fp64 precision, which then made the scheduler
  comparison logic fail.
issue_refs:
  - issue_id: "42290"
    title: "[Bug]mindone diffusers DPMSolverSDEScheduler精度不达标"
    url: "https://gitcode.com/mindspore/org-issues/issues/42290"
    project: "mindspore/org-issues"
    component: "B-MDTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Disable scalar-tensor demotion for the right-hand eq operand so float64 comparisons keep full precision"
  diff: |
    --- a/ops/eq.yaml
    +++ b/ops/eq.yaml
    @@
    +disable_scalar_tensor: other
    Notes:
    - Issue comment explicitly says the fix is to add
      `disable_scalar_tensor: other` in `eq.yaml`.
    - The linked implementation change is in PR #92163.
