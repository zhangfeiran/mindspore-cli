detection:
  pattern: "(亚健康热切信号未上报|mindio_ttp 7\\.2rc1|热切)"
description: |
  High-availability subhealth hot-switch signaling can appear broken even when
  the framework path is correct, because older `mindio_ttp` packages do not
  support this feature.
issue_refs:
  - issue_id: "42350"
    title: "[Bug]: 高可用亚健康热切信号未上报"
    url: "https://gitcode.com/mindspore/org-issues/issues/42350"
    project: "mindspore/org-issues"
    component: "B-SIG-HighAvailability"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Gate the feature on supported `mindio_ttp` versions; `7.2rc1` does not support subhealth hot-switch reporting, while `7.3.0` and `26.0.0` do."
  diff: |
    1. Treat this as an environment compatibility issue first, not a framework
       code defect.
    2. Require `mindio_ttp >= 7.3.0` or `26.0.0` for subhealth hot-switch
       reporting scenarios.
    3. Add version checks or troubleshooting guidance so unsupported package
       combinations fail with a clear compatibility hint instead of silent
       signal-missing behavior.
