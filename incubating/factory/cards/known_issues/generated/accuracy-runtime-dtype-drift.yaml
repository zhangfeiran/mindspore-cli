kind: known_issue
id: accuracy-runtime-dtype-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, dtype-drift]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42162 reports an apparent fp64 precision failure for
  `Tan` in a 0-d testcase. The issue analysis says the operator implementation
  was not wrong. The testcase fed float64 input into the framework side but the
  tensorflow benchmark path converted it to float32, so the comparison was
  invalid and could randomly fail.
issue_refs:
  - issue_id: "42162"
    title: "[Bug]: Tan fp64偶现精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42162"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Keep the float64 benchmark in float64 instead of downcasting to float32 in the testcase"
  diff: |
    --- a/tan_ops.py
    +++ b/tan_ops.py
    @@ forward_tensorflow_impl
    -x = tf.Variable(self.input_np.astype(np.float32))
    +x = tf.Variable(self.input_np.astype(self.dtype))
    Notes:
    - The issue conclusion explicitly says the root cause is test-case handling:
      the tf forward path wrongly converts float64 input to float32.
    - The fix is to add a float64 branch and stop downcasting the benchmark.
