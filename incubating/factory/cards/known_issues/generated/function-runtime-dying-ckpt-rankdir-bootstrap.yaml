kind: known_issue
id: function-runtime-dying-ckpt-rankdir-bootstrap
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, checkpoint, tft, dying-ckpt, rank-dir]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(not a real directory|rank_\\d+|临终ckpt|TrainFaultTolerance)"
description: |
  mindspore/org-issues#42402 reports that process-level recovery with dying
  checkpoint enabled fails because some `checkpoint/rank_x` directories are
  missing after interruption. The issue analysis explains the regression: an
  earlier bugfix stopped pre-creating empty checkpoint directories during init,
  but the dying-checkpoint flow still relies on those rank directories being
  present before the first real save.
issue_refs:
  - issue_id: "42402"
    title: "[Bug]: 使用qween, 临终ckpt适配进程级恢复， step=5的时候恢复， 报错： output/checkpoint/rank_2 is not a real directory"
    url: "https://gitcode.com/mindspore/org-issues/issues/42402"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Bootstrap rank checkpoint directories during init when dying checkpoint is enabled"
  diff: |
    --- a/mindformers/checkpoint/bootstrap.py
    +++ b/mindformers/checkpoint/bootstrap.py
    @@
    -if create_rank_dirs_early:
    -    skip()
    +if enable_train_fault_tolerance:
    +    create_rank_dirs_early()
