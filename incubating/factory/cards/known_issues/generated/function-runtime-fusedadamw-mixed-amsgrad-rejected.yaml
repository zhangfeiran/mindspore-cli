kind: known_issue
id: function-runtime-fusedadamw-mixed-amsgrad-rejected
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, runtime, fusedadamw, amsgrad]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(FusedAdamW|mixed amsgrad|unsupported operand type\\(s\\) for \\+=)"
description: |
  mindspore/org-issues#42227 reports that `FusedAdamW.add_param_group()` can
  crash with `unsupported operand type(s) for +=: 'NoneType' and
  'ParameterTuple'`. The issue analysis shows the real bug: the optimizer was
  created with `amsgrad=False`, so `max_exp_avg_sq` was never initialized, and
  a later param group with `amsgrad=True` tried to extend state that did not
  exist.
issue_refs:
  - issue_id: "42227"
    title: "[Bug]: fusedadamw算子报错：TypeError: unsupported operand type(s) for +=: 'NoneType' and 'ParameterTuple'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42227"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Reject mixed `amsgrad` usage across FusedAdamW param groups with an explicit validation error"
  diff: |
    --- a/mindspore/nn/optim/fused_adamw.py
    +++ b/mindspore/nn/optim/fused_adamw.py
    @@
    +if need_amsgrad != self.global_amsgrad:
    +    raise ValueError(
    +        f"FusedAdamW does not support mixed amsgrad across param_groups. "
    +        f"Init amsgrad={self.global_amsgrad}, but new group amsgrad={need_amsgrad}.")

    Notes:
    - Public issue comments explicitly say the chosen fix is interception, not
      support for mixed `amsgrad`.
    - The linked repair PR is `mindspore/pull/91999`.
