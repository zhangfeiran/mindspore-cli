kind: known_issue
id: failure-build-lite-gcc-wno-unused-private-field-unsupported
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, build, lite, gcc, warning-flag]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(cc1plus: error: unrecognized command line option .*Wno-unused-private-field|ascend_ge_plugin)"
description: |
  MindSpore Lite 云侧加解密版本在某些 GCC 工具链上构建时，会因为注入了编译器不支持的
  `-Wno-unused-private-field` 且开启 `-Werror`，直接在 `ascend_ge_plugin` 编译阶段失败。

  已知触发样例来自 issue `42404`，master `5b354207e1c982f06c6e0be49d137ce931a13d1c` 在 Linux x86_64
  环境下编译云侧加解密包时复现。
issue_refs:
  - issue_id: "42404"
    title: "[Bug]: 编译mindspore lite云侧加解密版本包报错cc1plus: error: unrecognized command line option ‘-Wno-unused-private-field’ [-Werror]"
    url: "https://gitcode.com/mindspore/org-issues/issues/42404"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "按编译器能力条件化注入 `-Wno-unused-private-field`，或在不支持的 GCC 上移除该 flag。"
  diff: |
    1. 在 Lite/CMake 的编译选项拼装处为 `-Wno-unused-private-field` 增加编译器版本探测，只对支持该 warning 的 Clang/GCC 版本启用。
    2. 对 `-Werror` 构建链路补兼容保护，避免因为“未知 warning 选项”把整包编译直接打断。
    3. 为云侧加解密、ACL delegate 等开启更多编译分支的构建配置补一条工具链兼容性回归。
