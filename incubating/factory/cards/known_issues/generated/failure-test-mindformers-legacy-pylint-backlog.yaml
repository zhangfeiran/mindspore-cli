kind: known_issue
id: failure-test-mindformers-legacy-pylint-backlog
symptom: failure
severity: low
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-mindformers-train, mindspore-mindformers, test, pylint, backlog]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(pylint|旧有的pylint问题阻塞后续合入)"
description: |
  MindFormers `master` 分支遗留的 `pylint` 问题会直接阻塞后续 PR 合入，即使新提交本身没有引入新的 lint 回归。

  已知触发样例来自 issue `2208`：仓内已有的历史 `pylint` 错误未清理，导致后续开发者提交 PR 时被同一批旧问题卡住。
issue_refs:
  - issue_id: "2208"
    title: "[Bug]: master分支旧pylint问题影响后续pr合入"
    url: "https://gitcode.com/mindspore/mindformers/issues/2208"
    project: "mindspore/mindformers"
    component: "B-SIG-MindFormers-Train"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "先清理 master 上已知的存量 pylint 问题，再恢复“只拦增量回归”的门禁语义。"
  diff: |
    1. 将现有 `pylint` 报错按文件或规则拆解，先批量清理历史欠账，避免后续 PR 被无关旧问题阻塞。
    2. 在门禁层区分“存量问题”和“新增问题”，优先拦截增量回归，而不是重复要求每个 PR 修复整仓历史欠账。
    3. 清理完成后重新收紧 `pylint` 门禁，防止历史问题再次积累。
