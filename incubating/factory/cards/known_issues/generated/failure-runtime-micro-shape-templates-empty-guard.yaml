kind: known_issue
id: failure-runtime-micro-shape-templates-empty-guard
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, micro, converter, shape-templates, resize]
occurrence_count: 1
affects_platforms: [cpu]
detection:
  pattern: "(shape_templates is empty|MSModelResize|Micro)"
description: |
  Micro conversion can emit `CodeMSModelResize] shape_templates is empty` and
  later fail link/build because a redundant `shape_templates` guard blocks code
  generation for dynamic-resize helpers.
issue_refs:
  - issue_id: "42319"
    title: "[Bug]: xiaoyi_lstmp_lora_infer.ms模型执行micro推理，转换报错CodeMSModelResize] shape_templates is empty"
    url: "https://gitcode.com/mindspore/org-issues/issues/42319"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "closed"
fix:
  summary: "Remove the redundant `shape_templates` emptiness check in the micro converter path so resize code is still generated for valid models."
  diff: |
    1. Drop the extra `shape_templates` empty guard introduced by cleanup work.
    2. Allow the converter/codegen path to continue generating `MSModelResize*`
       symbols for affected Micro models.
    3. Revalidate with the original failing Micro conversion, build, and
       inference flow instead of only unit-level checks.
