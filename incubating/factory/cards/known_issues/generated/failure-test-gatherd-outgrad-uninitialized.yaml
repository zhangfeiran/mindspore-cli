kind: known_issue
id: failure-test-gatherd-outgrad-uninitialized
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-geek, mindspore-org-issues, test, gatherd, grad, vmap]
occurrence_count: 1
affects_operators: [gatherd]
affects_platforms: [cpu]
detection:
  pattern: "(NoneType.*astype|grad_vmap_cmp\\(\\))"
description: |
  mindspore/org-issues#42254 reports `AttributeError: 'NoneType' object has no
  attribute 'astype'` in GatherD vmap grad tests. The issue analysis marks this
  as a testcase bug, not an operator implementation problem: `grad_vmap_cmp()`
  consumes `self.out_grad_np`, but the test called it before `grad_cmp()`
  populated that field.
issue_refs:
  - issue_id: "42254"
    title: "[Bug]: GatherD算子报错AttributeError: 'NoneType' object has no attribute 'astype'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42254"
    project: "mindspore/org-issues"
    component: "B-SIG-GEEK"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Initialize `out_grad_np` before running the vmap gradient comparison"
  diff: |
    --- a/test_gatherd.py
    +++ b/test_gatherd.py
    @@
         fact.forward_cmp()
    +    fact.grad_cmp()
         fact.grad_vmap_cmp()

    Notes:
    - Issue comments explicitly say this is a non-issue in the operator.
    - The required change is testcase ordering: call `grad_cmp()` first so
      `self.out_grad_np` is materialized before `grad_vmap_cmp()`.
