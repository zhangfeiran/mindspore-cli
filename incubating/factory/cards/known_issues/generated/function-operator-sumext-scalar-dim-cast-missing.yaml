kind: known_issue
id: function-operator-sumext-scalar-dim-cast-missing
symptom: failure
severity: critical
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, sumext, int64, tensor-cast]
occurrence_count: 2
affects_operators: [sumext]
affects_platforms: [ascend]
detection:
  pattern: "(For Operator\\[SumExt\\].*Int64.*expected type 'Tensor'|PrimitiveFunction_SumExt)"
description: |
  mindspore/org-issues#42242 and #42274 are the same concrete regression: the
  `SumExt` call path receives an `Int64` scalar where the operator expects a
  tensor input. Both failures surface during DeepSeek graph build, including
  the disk-IO fault-injection case, which means the problem is in argument
  normalization and not in one specific training topology.
issue_refs:
  - issue_id: "42242"
    title: "[Bug]: deepseek-mcore网络，多个场景，训练报错，TypeError: For Operator[SumExt], input's type 'Int64' does not match expected type 'Tensor'."
    url: "https://gitcode.com/mindspore/org-issues/issues/42242"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
  - issue_id: "42274"
    title: "[Bug]: 场景是deepseek v3网络，双机16卡，在加载完整权重、数据读取阶段注入磁盘IO高的故障，报错在SumExt算子，输入类型不匹配。"
    url: "https://gitcode.com/mindspore/org-issues/issues/42274"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Normalize scalar dim-like arguments to tensor form before invoking `SumExt`"
  diff: |
    --- a/mindspore/python/mindspore/ops/function/math_func.py
    +++ b/mindspore/python/mindspore/ops/function/math_func.py
    @@
    -return sumext_(input_x, dim)
    +if isinstance(dim, int):
    +    dim = Tensor(dim, mstype.int64)
    +return sumext_(input_x, dim)
