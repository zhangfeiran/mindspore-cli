kind: known_issue
id: failure-profiler-mindstudio-blockdim-column-rename
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, profiler, mindstudio, csv-schema, blockdim]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(blockdim字段名变更|Block Dim|Block Num|列不一致)"
description: |
  MindStudio Profiler 输出列名从 `Block Dim` 变更为 `Block Num` 后，依赖旧字段名的 profiler 检查脚本会批量失败。
issue_refs:
  - issue_id: "42370"
    title: "[Bug]: MindStudio Profiler 涉及blockdim字段名变更,导致profiler用例大批量失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42370"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "让 profiler 校验逻辑兼容新旧列名契约，避免工具字段演进引发批量误报。"
  diff: |
    1. 在 `profiler_check.py` 等校验逻辑中同时接受 `Block Dim` 和 `Block Num`，或统一做列名映射。
    2. 对新增的扩展列保持宽松解析，而不是要求列集合完全固定。
    3. 为不同 MindStudio/Profiler 版本输出补 schema 兼容回归。
