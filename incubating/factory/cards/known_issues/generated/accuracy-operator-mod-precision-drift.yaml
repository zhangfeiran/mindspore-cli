kind: known_issue
id: accuracy-operator-mod-precision-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, mod]
occurrence_count: 1
affects_operators: [mod]
affects_platforms: [cpu]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42453 reports a dynamic-shape float32 `mod` mismatch.
  The issue analysis traces the failure to a boundary-sensitive testcase:
  `ReduceSum` introduces about `1.9e-06` difference between the two frameworks,
  which makes one side see `x == y` and the other see `x < y`, producing
  drastically different `%` outputs. The recommended fix is to relax testcase
  tolerance rather than changing the `mod` implementation.
issue_refs:
  - issue_id: "42453"
    title: "[Bug]: mod算子 dynamic shape, dtype=float32， 固定seed=1775226468, 正向计算结果与标杆差太大"
    url: "https://gitcode.com/mindspore/org-issues/issues/42453"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "opened"
fix:
  summary: "Increase the testcase tolerance for the dynamic-shape float32 mod case instead of patching the kernel"
  diff: |
    --- a/test_mod.py
    +++ b/test_mod.py
    @@
    -fact = ModDynamicShapeFactory([input_x, input_y, indices], dtype=np.float32)
    +fact = ModDynamicShapeFactory([input_x, input_y, indices], loss=0.005, dtype=np.float32)
    Notes:
    - Issue comment says the original default tolerance `1e-4` is too strict for
      this boundary case.
    - The difference is triggered by a tiny ReduceSum accumulation deviation,
      not by a systemic `mod` formula bug.
