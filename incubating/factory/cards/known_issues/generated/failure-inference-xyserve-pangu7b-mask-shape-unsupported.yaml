description: |
  `Pangu 7B` 在 `XYServe` 服务化推理长稳场景下，如果请求落到不支持的 mask 形状组合，
  会在 `UnpadFlashAttentionNzOperation` 侧直接报 `current mask shape is unsupported!`。

  已知触发样例来自 issue `42360`：在 Ascend 300iduo 上启动 `ascend-pytorch-inference-pangu7b`
  服务后做长稳压测，日志中持续报 `mask invalid` 和 `plan kernel inferShape fail`。
issue_refs:
