fix:
  summary: "在 XYServe 推理链路中对 mask shape 做前置规范化或能力校验，避免异常请求直接进入 UnpadFlashAttentionNz。"
  diff: |
    1. 固定 `Pangu7B + XYServe + long-running` 服务场景，确认触发该错误的实际 mask shape 组合。
    2. 在服务前处理或推理图构造阶段拦截不支持的 mask 形状，必要时回退到兼容实现。
    3. 为长稳服务化推理补一条 mask-shape 能力回归，避免相同错误在压测场景反复出现。
