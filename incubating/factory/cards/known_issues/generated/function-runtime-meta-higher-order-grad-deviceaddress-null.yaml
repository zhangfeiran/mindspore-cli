confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, meta, higher-order-grad, device-address]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(DeviceCtx\\(\"meta\"\\)|高阶微分|core|DeviceAddress::GetTensorStorageInfo)"
description: |
  mindspore/org-issues#42289 is a concrete meta-device lifetime bug. A
  higher-order grad path executes under `DeviceCtx(\"meta\")` after the model is
  initialized and a forward has run, then crashes because a null device address
  or storage handle is consumed on the meta path.
issue_refs:
  - issue_id: "42289"
    title: "[Bug]: 用例执行core，场景：在with中，模型初始化后做前向传播,构造net，执行高阶微分"
    url: "https://gitcode.com/mindspore/org-issues/issues/42289"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Reject or materialize meta-device storage before higher-order grad consumes it"
  diff: |
    --- a/mindspore/core/device_address/device_address.cc
    +++ b/mindspore/core/device_address/device_address.cc
    @@
    -return storage_info_;
    +MS_EXCEPTION_IF_NULL(storage_info_);
    +return storage_info_;
