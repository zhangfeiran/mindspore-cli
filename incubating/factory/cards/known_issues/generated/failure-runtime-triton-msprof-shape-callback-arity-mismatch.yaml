kind: known_issue
id: failure-runtime-triton-msprof-shape-callback-arity-mismatch
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, triton, msprof, callback, arity]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(TRITON_REGISTER_TENSOR_MSPROF=1|get_tensor_params_shape\\(\\) takes 1 positional argument but 13 were given)"
description: |
  Triton Ascend 在启用 `TRITON_REGISTER_TENSOR_MSPROF=1` 时，`get_tensor_params_shape` 回调的参数契约与 MindSpore 后端不一致，
  直接触发 Python `TypeError`。
issue_refs:
  - issue_id: "42276"
    title: "[Bug]: Triton_ascend对接mindspore后端问题。"
    url: "https://gitcode.com/mindspore/org-issues/issues/42276"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "统一 Triton Ascend 对接 MindSpore 时的 `get_tensor_params_shape` 回调签名和调用参数。"
  diff: |
    1. 对齐 `driver.py`、`utils.py` 与 backend strategy registry 中 `get_tensor_params_shape` 的函数签名。
    2. 明确该回调到底接收单个参数对象还是展开后的 tensor 参数列表，消除调用方/实现方契约分裂。
    3. 为 `TRITON_REGISTER_TENSOR_MSPROF=1` 场景补回归，防止 profiling 开关一开就崩。
