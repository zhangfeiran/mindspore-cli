kind: known_issue
id: function-runtime-partial-unused-input-div-typeerror
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, runtime, parallel, partial, qwen3-moe]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(For Operator\\[Div\\].*Int64.*Tensor|partial.*未使用的输入)"
description: |
  mindspore/org-issues#42144 reports a Qwen3-MoE training failure that surfaces
  as `For Operator[Div], input's type 'Int64' does not match expected type
  'Tensor'`. The issue comments explain that the visible type error is only the
  symptom: MindFormers refactoring introduced unused loss values in `construct`,
  which left unused inputs inside partial-call nodes, and the parallel pass
  could not handle those dead inputs correctly.
issue_refs:
  - issue_id: "42144"
    title: "[Bug]: qwen3-moe网络训练报错，For Operator[Div], input's type 'Int64' does not match expected type 'Tensor"
    url: "https://gitcode.com/mindspore/org-issues/issues/42144"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
fix:
  summary: "Add an optimization pass to eliminate unused inputs in partial-call nodes before parallel passes run"
  diff: |
    --- a/mindspore/parallel/optimizer/partial_call_cleanup.cc
    +++ b/mindspore/parallel/optimizer/partial_call_cleanup.cc
    @@
    +EliminateUnusedPartialInputs(graph);

    Notes:
    - Issue comments explicitly say the fix is to optimize away unused inputs in
      partial-call nodes.
    - The linked repair PR is `mindspore/pull/92190`.
