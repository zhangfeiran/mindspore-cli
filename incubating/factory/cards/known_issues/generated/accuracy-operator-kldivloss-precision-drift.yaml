kind: known_issue
id: accuracy-operator-kldivloss-precision-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-inferops, mindspore-org-issues, accuracy, precision-drift, kldivloss]
occurrence_count: 1
affects_operators: [kldivloss]
affects_platforms: [cpu]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#41914 reports an occasional CPU `KLDivLoss` precision
  mismatch in a dynamic-rank testcase. The issue comments do not identify a
  kernel defect. The analysis classifies it as a non-issue / environment-side
  occasional fluctuation, and the follow-up validation ran the case 100 times
  without reproducing the failure. The recommended action is to adjust the
  testcase to avoid repeatedly flagging this low-probability scene as an
  operator regression.
issue_refs:
  - issue_id: "41914"
    title: "[Bug]:CPU后端KLDivLoss算子偶现精度异常，固定--randomly-seed=1768580125必现精度异常"
    url: "https://gitcode.com/mindspore/org-issues/issues/41914"
    project: "mindspore/org-issues"
    component: "B-SIG-InferOps"
    backend: "CPU"
    priority: "次要"
    status: "closed"
fix:
  summary: "Treat the issue as a flaky testcase and tighten the test strategy instead of modifying the KLDivLoss kernel"
  diff: |
    --- a/test_kldivloss.py
    +++ b/test_kldivloss.py
    @@
    -# fixed single-seed case is treated as a hard precision regression
    +# avoid treating this low-probability dynamic-rank scene as a kernel bug
    +# either relax the gate condition or move it out of strict precision gating
    Notes:
    - Issue analysis says "特定场景下偶现精度问题，按版本规范划归为非问题".
    - Validation reran the testcase 100 times without reproducing the failure.
    - The concrete change should happen in the testcase/gating strategy, not in
      the CPU KLDivLoss implementation.
