kind: known_issue
id: failure-converter-lite-modelc-getinputs-new-fail-leak
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindspore-mindspore-lite, converter, modelc, memory-leak, c-api]
occurrence_count: 1
affects_platforms: [cpu]
detection:
  pattern: "(converter工具内存泄漏|ModelC::GetInputs|GetOutputsTensor|new \\(std::nothrow\\) MSTensor)"
description: |
  MindSpore Lite `converter`/C API 路径在 `ModelC::GetInputs()` 和 `GetOutputsTensor()` 分配 `MSTensor` 数组时，
  若中途 `new` 失败，已分配对象没有回收，会产生内存泄漏。

  该问题在 issue `mindspore-lite#242` 中被明确指出，属于稳定可分析的资源释放缺陷。
issue_refs:
  - issue_id: "242"
    title: "[Bug]: converter工具内存泄漏"
    url: "https://gitcode.com/mindspore/mindspore-lite/issues/242"
    project: "mindspore/mindspore-lite"
    component: "B-SIG-InnerDelivery"
    backend: "CPU"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "在 `ModelC::GetInputs/GetOutputsTensor` 的分配失败路径回收已创建对象，避免部分构造后的泄漏。"
  diff: |
    1. 对 `new (std::nothrow) MSTensor(...)` 失败分支增加已分配元素的逐个释放，而不是仅 `clear()` 容器。
    2. 将资源分配改成 RAII/智能指针管理，减少部分成功部分失败时的手工回收漏洞。
    3. 为注入 `new` 失败的异常路径补单元测试，确保 converter/C API 在低内存场景下不泄漏。
