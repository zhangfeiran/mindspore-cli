kind: known_issue
id: function-operator-ctcloss-addn-mixed-dtype
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, ctcloss, addn, dtype]
occurrence_count: 1
affects_operators: [ctcloss]
affects_platforms: [cpu]
detection:
  pattern: "(CtcLoss|For primitive\\[AddN\\]|input type must be same)"
description: |
  mindspore/org-issues#42292 fails inside the `CtcLoss` path with
  `For primitive[AddN], the input type must be same`. The report shows mixed
  `Tensor[Int32]` and `Tensor[Float32]` inputs being fed into `AddN`, so the
  regression is a dtype normalization bug in the loss accumulation path rather
  than a generic shape mismatch.
issue_refs:
  - issue_id: "42292"
    title: "[Bug]: CtcLoss算子报错输入类型没对齐"
    url: "https://gitcode.com/mindspore/org-issues/issues/42292"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Cast auxiliary integer tensors before `AddN` aggregation in the CTC loss path"
  diff: |
    --- a/mindspore/python/mindspore/ops/function/nn_func.py
    +++ b/mindspore/python/mindspore/ops/function/nn_func.py
    @@
    -total = ops.addn((loss, target_lengths, input_lengths))
    +total = ops.addn((
    +    loss,
    +    ops.cast(target_lengths, loss.dtype),
    +    ops.cast(input_lengths, loss.dtype),
    +))
