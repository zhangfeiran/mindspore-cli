kind: known_issue
id: failure-operator-cumsum-workspace-cap-mismatch
symptom: failure
severity: critical
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, cumsum, workspace, cann-upgrade, ascend]
occurrence_count: 1
affects_operators: [cumsum]
affects_platforms: [ascend]
detection:
  pattern: "(Launch kernel failed:.*CumSum|workspace->GetSize\\(\\) <= args.GetWorkspaceCap\\(\\)|Acl compile and execute failed, op_type_:Cumsum)"
description: |
  `Cumsum` 在 Ascend 上可能因 workspace 容量协商不一致直接失败，典型报错包含
  `workspace->GetSize() <= args.GetWorkspaceCap()` 断言和 `Launch kernel failed: ... CumSum-op0`。

  已知触发样例来自 issue `42226`：在 `mindspore c899f34db + cann_9.0.0_20260210` 上，`float32` 大张量
  `cumsum` 前向/反向执行时失败；相同用例在 `mindspore abd023d699 + cann_8.5.0_20260105` 上通过，
  表明问题与新版本 CANN 的 workspace 契约变化强相关。
issue_refs:
  - issue_id: "42226"
    title: "[Bug]: cumsum算子报错：Launch kernel failed:CumSum-op0，Execute op failed. op type = Cumsum"
    url: "https://gitcode.com/mindspore/org-issues/issues/42226"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
fix:
  summary: "同步 Cumsum 对 CANN 新版 workspace 大小的查询与下发逻辑，避免实际申请 workspace 超过 runtime 记录的 cap。"
  diff: |
    1. 检查 `Cumsum` ACLNN/TBE 适配层在 `GetWorkspace` 与 `Launch` 两阶段使用的 workspace 大小是否一致，特别是 CANN 9.0 升级后的返回值语义。
    2. 修正 `args.GetWorkspaceCap()` 或对应 kernel metadata 的填充逻辑，确保 runtime 记录的 workspace 容量覆盖算子真实需求。
    3. 为大 shape、反向路径和跨 CANN 版本场景补回归，防止再次出现 `workspace cap` 断言。
