kind: known_issue
id: failure-runtime-mindformers-profilemonitor-context-init-order
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, mindformers, profilemonitor, context, init-order]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(ProfileMonitor接口报错|Build a Context instance before get_context\\(\\)|output_path='./profile_dir')"
description: |
  `mindformers.core.ProfileMonitor` 在构造阶段直接调用 `get_context("device_target")`，
  但此时 `Context` 可能尚未构建，导致接口本身无法独立初始化。
issue_refs:
  - issue_id: "42304"
    title: "[Bug]: 【MindFormers】【冒烟】mindformers.core.ProfileMonitor接口报错，RuntimeError: Build a Context instance before get_context()."
    url: "https://gitcode.com/mindspore/org-issues/issues/42304"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "调整 `ProfileMonitor` 对上下文的依赖时机，避免在 `Context` 未初始化时抢先读取配置。"
  diff: |
    1. 将 `get_context()` 访问延后到真正启动 profiler 时，或在构造阶段对 `Context.is_exists()` 做保护。
    2. 允许 `ProfileMonitor(output_path=...)` 在无上下文环境下先被安全构造，再由上层训练入口完成 context 初始化。
    3. 为 `ProfileMonitor` 独立实例化补单测，确保接口不会因为初始化顺序问题直接报错。
