kind: known_issue
id: accuracy-operator-exp2-dtype-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, dtype-drift, exp2]
occurrence_count: 1
affects_operators: [exp2]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42160 reports an occasional fp16 accuracy failure for
  `exp2`. The issue comments say this was caused by the testcase comparison
  rule, not by the operator kernel. For float16 operators, the benchmark should
  be promoted to float32 for computation and cast back to float16 before
  comparison. The comments also recommend increasing the testcase data size to
  reduce randomness.
issue_refs:
  - issue_id: "42160"
    title: "[Bug]: ops.exp2 fp16偶现精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42160"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Fix the float16 testcase comparison rule and enlarge the test shape instead of changing exp2"
  diff: |
    --- a/f_exp2.py
    +++ b/f_exp2.py
    @@
    -expected = benchmark(input_fp16)
    +expected = benchmark(input_fp16.astype(np.float32)).astype(np.float16)
    @@
    -shape = (6,)
    +shape = (64,)  # or (128,)
    Notes:
    - Issue comment says the benchmark must be computed in float32 first for
      float16 operator comparison.
    - The same comment recommends increasing the sample size from 6 to 64/128.
