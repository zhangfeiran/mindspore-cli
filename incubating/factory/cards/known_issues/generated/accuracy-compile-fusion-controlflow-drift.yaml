kind: known_issue
id: accuracy-compile-fusion-controlflow-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, compile, fusion, controlflow]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(控制流场景|融合)"
description: |
  mindspore/org-issues#42220 reports precision failures in a control-flow CV
  fusion scene under DVM. The issue discussion points to a DVM CV fusion bug
  when the same input participates in fused cube/load paths. The recorded fix
  recreates dedicated loads for cube inputs and adds the GM node into the
  recover tracker to avoid stale load state after relocation.
issue_refs:
  - issue_id: "42220"
    title: "[Bug]: DVM无图融合CV融合的控制流场景精度报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42220"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Fix the DVM CV fusion load handling for same-input control-flow scenes"
  diff: |
    --- a/dvm/cv_fusion/controlflow_pass.cc
    +++ b/dvm/cv_fusion/controlflow_pass.cc
    @@
    -reuse load nodes across fused cube inputs
    +recreate dedicated load nodes for cube-owned inputs
    @@
    -recover tracker: no gm entry
    +recover tracker: add gm entry after first relocation
    Notes:
    - Issue comments explicitly mention both changes.
    - The referenced framework-side landing PR is #91960.
