kind: known_issue
id: accuracy-runtime-dense-activation-mutation-backward-stale
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, dense, activation, backward, stale-state]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(更改其中一个的激活函数|fc2\\.activation = get_activation\\(\"relu6\"\\)|backward_cmp)"
description: |
  `nn.Dense` 在初始化后如果动态修改 `activation`，前反向执行可能没有完全同步到新状态，导致梯度仍按旧激活路径计算。

  已知触发样例来自 issue `42251`：先将 `fc.activation=None`，再把 `fc2.activation` 改为 `relu6`，
  前向可通过，但反向对比时 PyTorch 梯度约为 `3.6546376`，而 MindSpore 对应位置变成了 `0`。
issue_refs:
  - issue_id: "42251"
    title: "[Bug]: 定义两个带不同激活函数的全连接层，并在初始化后更改其中一个的激活函数，报错精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42251"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "保证 `Dense.activation` 运行期变更后，前向标志位、反向图和缓存状态一起更新，避免继续沿用旧激活逻辑。"
  diff: |
    1. 梳理 `Dense.activation`、`activation_flag` 与实际前反向构图状态之间的关系，避免仅修改属性对象而未刷新内部执行路径。
    2. 在运行期属性变更后触发必要的状态重建或缓存失效，保证 backward 使用的是新激活函数。
    3. 为“先构造 Dense，再替换 activation”的前反向场景补回归，覆盖 `relu -> none/relu6` 这类组合。
