fix:
  summary: "按并行策略组合排查首个分歧 step，重点看 pp/ep/cp 与优化器或 moe 路径的交互。"
  diff: |
    1. 按 `dp/mp/pp/ep/cp` 组合分组复现实验，确认是特定切分组合引入 loss spike。
    2. 对首个异常 step 抓通信、切分和优化器状态，避免只从整条 loss 曲线看现象。
    3. 为高风险并行组合补专项基线，不再用一张“并行运行失败”大桶兜底。
