detection:
  pattern: "(AttributeError|has no attribute)"
description: |
  mindspore/org-issues#42286 reports that Qwen3 precondition inference fails
  with `AttributeError: 'Qwen3Config' object has no attribute 'is_dynamic'`.
  Unlike the other attribute-missing reports that have now been split into
  dedicated cards, this issue currently exposes only the fix PR link in the
  public discussion. The available signal is that MindFormers added a
  compatibility fix around Qwen3 config attribute access.
issue_refs:
  - issue_id: "42286"
    title: "[Bug]: B050全量，qwen3训练前向推理，报AttributeError: 'Qwen3Config' object has no attribute 'is_dynamic'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42286"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Add Qwen3 config compatibility handling so callers do not require a missing `is_dynamic` field"
  diff: |
    Public issue comments only expose the fix PR:
    - https://gitcode.com/mindspore/mindformers/pull/8114

    Extracted repair direction:
    - guard Qwen3 config attribute access with a compatibility branch
    - derive dynamic behavior from existing config state when `is_dynamic`
      is absent
    - keep older Qwen3 configs loadable instead of crashing on direct access
