kind: known_issue
id: accuracy-runtime-backward-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, backward-drift]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42166 reports a backward failure when constant tensors
  are used inside `if/while/for` control-flow graphs on Ascend. The issue
  analysis says graph compile infer-value needs host-side tensors, but the
  current pipeline did not validate or synchronize the constant device tensor to
  host before infer-value ran.
issue_refs:
  - issue_id: "42166"
    title: "[Bug]: 	 if_while_for中使用常量tensor，反向报错RuntimeError: Can't access data on Ascend"
    url: "https://gitcode.com/mindspore/org-issues/issues/42166"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Synchronize constant device tensors to host before infer-value in graph compile"
  diff: |
    --- a/graph_compile/infer_value_pass.cc
    +++ b/graph_compile/infer_value_pass.cc
    @@
    -infer_value(const_input)
    +sync_const_tensor_to_host_if_needed(const_input)
    +infer_value(const_input)
    Notes:
    - Issue comments explicitly say infer-value must receive a correct CPU
      tensor and that the current compile flow lacked the host-sync check.
    - The referenced implementation PRs are #91764 and #91981.
