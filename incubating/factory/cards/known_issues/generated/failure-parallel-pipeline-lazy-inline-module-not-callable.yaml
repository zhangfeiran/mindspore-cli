fix:
  summary: "修正 `lazy_inline` 在 pipeline/global_norm 组合下的包装对象类型，避免把模块对象当可调用函数执行。"
  diff: |
    1. 检查 `lazy_inline` 改写后返回对象与 pipeline 包装器的契约是否一致。
    2. 确保 global_norm 和优化器并行路径不会把模块引用直接透传到调用位点。
    3. 为 `pipeline + lazy_inline + global_norm` 补专项回归。
