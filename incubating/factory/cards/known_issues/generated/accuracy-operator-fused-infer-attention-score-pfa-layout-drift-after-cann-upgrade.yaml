fix:
  summary: "对齐 PFA 路径在不同 layout 下的 shape/layout 映射和底层数值实现，恢复升级前的前向精度。"
  diff: |
    1. 对 `pfa_bnsd_fwd`、`pfa_bnsd_fwd_dynamic`、`pfa_bsh_fwd` 分别比对升级前后的输出差异，确认是 layout 相关漂移而非全 0 类硬错误。
    2. 检查 `BNSD/BSH` 到底层 kernel 的 layout 映射、transpose/reshape 和动态 shape 分支是否在新 CANN 下发生变化。
    3. 必要时为问题版本增加兼容分支或版本回退，先恢复门禁精度基线。
