kind: known_issue
id: failure-parallel-pipeline-reset-step-guard
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, pipeline, reset-step, dataset-size]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(Cannot reset the pipeline, reset step must be less than dataset_size \\* num_epochs)"
description: |
  扩展并行规模和 batch size 后，pipeline 重置逻辑对 `reset step < dataset_size * num_epochs` 的保护条件触发，
  导致训练直接失败。
issue_refs:
  - issue_id: "42322"
    title: "[Bug]ds-mcore网络，第一次dp1mp2pp8ep2mbn64bs1，第二次扩dp和batch_size,16->32p，报错Cannot reset the pipeline, reset step must be less than dataset_size * num_epochs. step: 125, dataset_size: 125, num_epochs: 1"
    url: "https://gitcode.com/mindspore/org-issues/issues/42322"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "调整 pipeline reset 对扩卡/变更 batch 后 step 边界的计算逻辑，避免合法恢复场景被误拦。"
  diff: |
    1. 检查扩卡后二次拉起时 `dataset_size`、`num_epochs` 和 `resume step` 的换算是否正确。
    2. 若 step 恰好等于边界，应明确判断是允许恢复还是给出更合理的修正策略。
    3. 为扩 `16 -> 32p` 和 batch 变更场景补恢复训练回归。
