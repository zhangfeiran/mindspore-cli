kind: known_issue
id: function-runtime-onnx-divs-convert-map-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-mdtest, mindspore-org-issues, onnx, export, divs, convert-map]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(Can not find key Divs in convert map|Exporting Divs operator is not yet supported)"
description: |
  mindspore/org-issues#42199 is a concrete ONNX export regression. After the
  `/` overload started lowering to `Divs`, the ONNX exporter convert map did
  not register a handler for `Divs`, so export failed at `ExportPrimitive`
  instead of serializing the graph.
issue_refs:
  - issue_id: "42199"
    title: "[Bug]: mindyolo yolov8n网络ckpt转onnx报错ExportPrimitive] Can not find key Divs in convert map. Exporting Divs operator is not yet supported."
    url: "https://gitcode.com/mindspore/org-issues/issues/42199"
    project: "mindspore/org-issues"
    component: "B-MDTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Register `Divs` in the ONNX exporter convert map"
  diff: |
    --- a/mindspore/ccsrc/utils/ir_dump/onnx/onnx_exporter.cc
    +++ b/mindspore/ccsrc/utils/ir_dump/onnx/onnx_exporter.cc
    @@
    -convert_map_ = { ..., {"Div", ExportDiv}, ... }
    +convert_map_ = { ..., {"Div", ExportDiv}, {"Divs", ExportDiv}, ... }
