kind: known_issue
id: function-operator-rmsnorm-grad-gamma-shape-check
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, rmsnorm, grad, gamma-shape]
occurrence_count: 1
affects_operators: [rms_norm]
affects_platforms: [ascend]
detection:
  pattern: "(aclnnRmsNormGradGetWorkspaceSize call failed|dy dim num should not be smaller than gamma dim num)"
description: |
  mindspore/org-issues#42357 is not a generic workspace failure. The public
  log shows the exact backend contract violation in the grad path:
  `dy dim num should not be smaller than gamma dim num`. This should be caught
  by front-end shape validation before invoking ACLNN.
issue_refs:
  - issue_id: "42357"
    title: "[Bug]: [兼容性测试]RmsNorm算子报错aclnnRmsNormGradGetWorkspaceSize call failed"
    url: "https://gitcode.com/mindspore/org-issues/issues/42357"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "无优先级"
    status: "closed"
fix:
  summary: "Validate gamma and gradient rank compatibility before calling `rms_norm` backward"
  diff: |
    --- a/mindspore/python/mindspore/ops/function/nn_func.py
    +++ b/mindspore/python/mindspore/ops/function/nn_func.py
    @@
    -return rms_norm_grad_(dy, x, gamma, epsilon)
    +if dy.ndim < gamma.ndim:
    +    raise ValueError("dy dim num should not be smaller than gamma dim num")
    +return rms_norm_grad_(dy, x, gamma, epsilon)
