kind: known_issue
id: failure-operator-avgpool2d-tiling-arg-normalization-missing
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, avg_pool2d, tiling, ascend, aclnn]
occurrence_count: 1
affects_operators: [avg_pool2d]
affects_platforms: [ascend]
detection:
  pattern: "(InitTilingParseCtx failed|AclNN_Runtime_Error\\(EZ9903\\)|avg_pool2d)"
description: |
  `mint.nn.functional.avg_pool2d` 在 Ascend 图模式下，特定非法或未规范化的二维池化参数组合会直接落到 ACLNN tiling 阶段失败，
  报 `AclNN_Runtime_Error(EZ9903): InitTilingParseCtx failed`，而不是在框架侧给出明确的参数校验错误。

  已知触发样例来自 issue `42384`：4D 输入调用 `avg_pool2d` 时传入 `kernel_size=(3,)`、`stride=(50,)`、`divisor_override=50`，
  最终在 tiling 解析阶段报错。
issue_refs:
  - issue_id: "42384"
    title: "[Bug]: mint.nn.functional.avg_pool2d  ascend后端AclNN_Runtime_Error(EZ9903): InitTilingParseCtx failed"
    url: "https://gitcode.com/mindspore/org-issues/issues/42384"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "在进入 ACLNN/TBE 前补齐 avg_pool2d 参数规范化与合法性校验，避免把一维参数或异常 divisor 直接下发到 tiling。"
  diff: |
    1. 在 `mint.nn.functional.avg_pool2d` 的前端适配层统一规范化 `kernel_size`、`stride`、`padding` 等参数，确保 2D 池化场景传给后端的是合法二维配置。
    2. 对 `divisor_override`、窗口维度与输入 rank 的组合增加前置检查；不满足约束时直接抛出可读的参数错误，而不是继续进入 `InitTilingParseCtx`。
    3. 为 `kernel_size/stride` 单元素元组、极端 stride、`NaN` 输入等 case 补图模式回归，保证报错位置稳定在框架侧。
