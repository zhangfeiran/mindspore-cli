kind: known_issue
id: function-doc-msprobe-static-graph-config-required
symptom: failure
severity: low
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, msprobe, doc, config-path]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(PrecisionDebugger.*config_path|Failed to load config)"
description: |
  mindspore/org-issues#42371 reports that users expect `PrecisionDebugger` to
  fall back to a default `config.json` when `config_path` is omitted, but that
  only applies to dynamic-graph usage. The public root-cause comment states
  this is a documentation problem: static-graph scenarios must pass
  `config_path` explicitly, and the docs failed to distinguish static and
  dynamic graph behavior.
issue_refs:
  - issue_id: "42371"
    title: "[Bug]: 使用msprobe工具，静态图L2场景，不传config_path场景报错：RuntimeError: Failed to load config, read log for more details."
    url: "https://gitcode.com/mindspore/org-issues/issues/42371"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Document that static-graph msprobe scenarios require an explicit `config_path`"
  diff: |
    --- a/docs/zh/dump/mindspore_data_dump_instruct.md
    +++ b/docs/zh/dump/mindspore_data_dump_instruct.md
    @@
    -config_path is optional
    +config_path is optional only for dynamic graph; static graph must pass it explicitly

    Notes:
    - Public issue comments explicitly say no code logic changed here.
    - The linked repair PR is `Ascend/msprobe/pull/471`.
