kind: known_issue
id: compat-runtime-ge-subgraphsink-heterogeneous-unsupported
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, ge, heterogeneous, subgraph-sink, dynamic-shape, unique]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(The GE backend does not support subgraph sink and heterogeneous scenarios|dynamic input.*Unique)"
description: |
  GE 后端当前不支持“子图下沉 + 异构执行”组合场景。动态 shape 网络里如果既有 `Unique`、索引选取，
  又混入异构执行路径，编译时会直接报 GE 能力不支持，而不是逻辑精度问题。

  已知触发样例来自 issue `42279`：动态输入 `x[index]` 中 `index` 由 `ops.Unique()` 生成，
  编译阶段报 `The GE backend does not support subgraph sink and heterogeneous scenarios, please use the ms backend`。
issue_refs:
  - issue_id: "42279"
    title: "[Bug]: 验证 ms 与 pt 在处理 **动态输入 + 索引选取 + Unique 操作** 时行为是否一致，报错 RuntimeError: The GE backend does not support subgraph sink and heterogeneous scenarios, please use the ms backend"
    url: "https://gitcode.com/mindspore/org-issues/issues/42279"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "对 GE 不支持的“subgraph sink + heterogeneous”组合前置报错或自动切换到 ms backend，避免在动态图索引场景里误用 GE。"
  diff: |
    1. 在编译路由阶段识别 `dynamic input + heterogeneous op + subgraph sink` 组合，提前给出明确 backend 选择建议。
    2. 能自动回退到 `ms backend` 的场景直接回退，不能回退时保持稳定且可检索的报错信息。
    3. 为 `Unique + tensor indexing + dynamic shape` 这类 parser case 补一条能力边界回归。
