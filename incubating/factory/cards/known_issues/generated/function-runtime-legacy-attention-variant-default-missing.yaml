kind: known_issue
id: function-runtime-legacy-attention-variant-default-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, runtime, legacy, attention, mindformers]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(experimental_attention_variant|NoneType.*experimental_attention_variant)"
description: |
  mindspore/org-issues#42330 reports that legacy MindFormers startup fails with
  `AttributeError: 'NoneType' object has no attribute
  'experimental_attention_variant'`. The issue analysis says the newly added
  branch did not consider legacy configurations where `transformer_config` can
  be absent. The fix is to read the attribute defensively and supply a default
  when the legacy path does not populate it.
issue_refs:
  - issue_id: "42330"
    title: "[Bug]: mf legacy raise error: 'NoneType' object has no attribute 'experimental_attention_variant'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42330"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Guard the legacy path with `getattr` and a default attention variant"
  diff: |
    --- a/mindformers/wrapper/wrapper.py
    +++ b/mindformers/wrapper/wrapper.py
    @@
    -self.is_dsa = transformer_config.experimental_attention_variant == "dsa"
    +attention_variant = getattr(transformer_config, "experimental_attention_variant", None)
    +self.is_dsa = attention_variant == "dsa"

    Notes:
    - Issue comments explicitly say the legacy branch was not considered.
    - The linked fix PR uses `getattr` with a default value to avoid crashing
      when legacy configs do not expose this field.
