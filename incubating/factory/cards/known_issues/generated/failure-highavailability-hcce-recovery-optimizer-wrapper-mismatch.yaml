kind: known_issue
id: failure-highavailability-hcce-recovery-optimizer-wrapper-mismatch
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-highavailability, mindspore-org-issues, highavailability, hcce, recovery, optimizer-wrapper]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(HCCE:1|tft_g_one_flag|TrainFaultTolerance|get_optimizer_wrapper)"
description: |
  HCCE recovery training can fail right after the first loss because the
  optimizer is wrapped by the wrong fault-tolerance class. The step-end
  reporting path then expects `tft_g_one_flag`, but the selected wrapper does
  not provide it.
issue_refs:
  - issue_id: "42422"
    title: "[Bug]: 【MindSpore】【继承特性】【高可用】HCCL算子重执行失败恢复执行测试中任务出第一步loss后报错"
    url: "https://gitcode.com/mindspore/org-issues/issues/42422"
    project: "mindspore/org-issues"
    component: "B-SIG-HighAvailability"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Include `HCCE:1` in redundant fault-report feature detection so the recovery path selects the optimizer wrapper that carries `tft_g_one_flag`."
  diff: |
    1. Update `TrainFaultTolerance.get_optimizer_wrapper()` feature gating so
       `HCCE:1` is treated like the other redundant-report modes.
    2. When only HCCE recovery is enabled, return `TFTOptSubCls` instead of
       `TFTOptSnapShotCls`.
    3. Keep step-end reporting and optimizer wrapper selection consistent so
       the recovery flow no longer dereferences a missing `tft_g_one_flag`.
