kind: known_issue
id: function-runtime-batchinvariant-missing-install-hint
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-infer, mindspore-ms-custom-ops, batchinvariant, install, error-message]
occurrence_count: 1
affects_operators: [batchinvariant]
affects_platforms: [ascend]
detection:
  pattern: "(batchinvariant|安装提示|对应的包)"
description: |
  mindspore/ms_custom_ops#5 is not an operator implementation bug. The issue is
  that when the external `batchinvariant` custom op package is not installed,
  users do not receive an actionable install hint naming the missing operator
  package and how to install it.
issue_refs:
  - issue_id: "5"
    title: "[Bug]: batchinvariant 算子没有安装对应算子的时候应该给出明确的提示。"
    url: "https://gitcode.com/mindspore/ms_custom_ops/issues/5"
    project: "mindspore/ms_custom_ops"
    component: "B-SIG-Infer"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Emit an explicit package-install hint when `batchinvariant` custom op is unavailable"
  diff: |
    --- a/ms_custom_ops/runtime/op_loader.py
    +++ b/ms_custom_ops/runtime/op_loader.py
    @@
    -raise RuntimeError("BatchInvariant is unavailable")
    +raise RuntimeError(
    +    "BatchInvariant op is unavailable. Please install the batchinvariant custom-op package and refer to the docs for installation steps."
    +)
