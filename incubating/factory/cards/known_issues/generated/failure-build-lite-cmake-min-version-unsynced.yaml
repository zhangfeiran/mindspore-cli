kind: known_issue
id: failure-build-lite-cmake-min-version-unsynced
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, build, lite, cmake, glog]
occurrence_count: 1
affects_platforms: [ascend, cpu]
detection:
  pattern: "(glog升级导致cmake版本不一致|cmake version|低版本cmake无法编译)"
description: |
  三方依赖 `glog` 升级后，如果仓内 `cmake` 最低版本约束和本地构建指引没有同步，低版本 CMake 环境会直接无法构建。

  已知触发样例来自 issue `42407`：master `5b354207e1c982f06c6e0be49d137ce931a13d1c`
  在 x86 环境下因 glog 升级引入更高的 CMake 需求，而本地低版本 CMake 仍沿用旧门槛。
issue_refs:
  - issue_id: "42407"
    title: "[Bug]: glog升级导致cmake版本不一致，本地低版本cmake无法编译"
    url: "https://gitcode.com/mindspore/org-issues/issues/42407"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend,CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "同步提高仓内 CMake 最低版本要求或对新 glog 版本做降级兼容，避免依赖升级后本地构建门槛失配。"
  diff: |
    1. 在顶层和 Lite 相关 `CMakeLists.txt` 中更新最低 CMake 版本约束，与 glog 升级后的真实要求保持一致。
    2. 在构建文档和预检脚本中增加版本检查，提前提示“当前 CMake 版本过低”而不是在中途编译失败。
    3. 如果短期不能统一抬高门槛，则在依赖管理层对 glog 版本做条件约束，给旧 CMake 环境保留可构建组合。
