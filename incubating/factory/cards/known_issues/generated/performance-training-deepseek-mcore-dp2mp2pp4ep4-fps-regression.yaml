description: |
  `DeepSeek-mcore` 在 `dp2mp2pp4ep4bs1mb8gas1` 并行策略下训练 FPS 从基线 `1616.9` 降到 `1540`。
  issue 启动命令里同时开启了 `GraphKernel` 对 `MatMul/Reshape/BatchMatMul/GroupedMatmul` 的聚类和在线调优，
  说明问题与该模型并行配置下的图算/并行执行路径强相关。
