fix:
  summary: "在 DeepSeek-mcore 特定并行策略下，对齐 GraphKernel/GroupedMatmul/运行时配置，恢复训练 FPS 基线。"
  diff: |
    1. 固定 `dp2mp2pp4ep4bs1mb8gas1`、`MS_DEV_GRAPH_KERNEL_FLAGS` 和 `MS_DEV_RUNTIME_CONF` 组合，确认是模型并行场景下的稳定性能回归。
    2. 检查 `GroupedMatmul`、`MatMul` 聚类融合与在线调优是否引入额外开销，必要时针对该并行策略关闭问题 pass 或切换实现。
    3. 为 DeepSeek-mcore 16P 训练建立独立基线，避免和其他 DeepSeek 场景混为一谈。
