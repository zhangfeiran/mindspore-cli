symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, rsqrt]
occurrence_count: 1
affects_operators: [rsqrt]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42261 reports `mint.rsqrt` / `Tensor.rsqrt` mismatches on
  Ascend. The issue comments tie the regression to CANN changes and specifically
  recommend deleting the custom `RsqrtGrad` AiCPU kernel file plus its
  registration entry, which was causing the problem.
issue_refs:
  - issue_id: "42261"
    title: "[Bug]: mint.rsqrt、Tensor.rsqrt asend后端计算结果与标杆不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42261"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Delete the custom RsqrtGrad AiCPU kernel and its registration entry"
  diff: |
    --- a/plugin/device/ascend/kernel/aicpu/custom/rsqrt_grad_custom.cc
    --- a/plugin/device/ascend/kernel/aicpu/custom/cust_aicpu_kernel.ini
    +++ b/plugin/device/ascend/kernel/aicpu/custom/cust_aicpu_kernel.ini
    @@
    -register RsqrtGrad custom AiCPU kernel
    +# removed; use backend-provided path
    Notes:
    - Issue comments explicitly say to delete the custom kernel file and the
      matching `cust_aicpu_kernel.ini` registration item.
    - The linked framework-side fix is PR #92160.
