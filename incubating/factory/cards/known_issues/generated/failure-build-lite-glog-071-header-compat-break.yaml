kind: known_issue
id: failure-build-lite-glog-071-header-compat-break
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, build, lite, glog, header-compat]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(glog/logging\\.h:136:1: error: expected declaration before .*}.* token|pytorch_parser_mid)"
description: |
  MindSpore Lite 端侧版本在接入 `glog 0.7.1` 后，旧的头文件兼容假设失效，导致包含
  `glog/logging.h` 的编译单元在全局作用域报 `expected declaration before '}' token`。

  已知触发样例来自 issue `42405`，master `5b354207e1c982f06c6e0be49d137ce931a13d1c`
  在 `pytorch_op_parser.cc.o` 构建阶段失败。
issue_refs:
  - issue_id: "42405"
    title: "[Bug]: 编译mindspore lite端侧版本包报错error: expected declaration before ‘}’ token"
    url: "https://gitcode.com/mindspore/org-issues/issues/42405"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "适配 glog 0.7.1 的头文件变化，修正 Lite 对旧版 glog 命名空间/宏布局的依赖。"
  diff: |
    1. 检查 Lite 侧对 `glog/logging.h` 的封装、宏开关和命名空间兼容代码，移除与 glog 0.7.1 不再兼容的条件编译片段。
    2. 在 CMake 或三方依赖层明确限定可接受的 glog 版本，必要时对 0.7.1 单独做兼容分支。
    3. 为端侧 converter/parser 相关编译目标补一条 glog 升级回归，防止头文件升级再次破坏构建。
