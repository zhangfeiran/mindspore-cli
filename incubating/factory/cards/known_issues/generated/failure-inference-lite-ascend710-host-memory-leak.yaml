detection:
  pattern: "(MindSporeLite云侧推理.*内存泄露|Ascend710|hdc_efficientnet_b3_1w_class)"
description: |
  MindSpore Lite 云侧推理在 Ascend710 后端存在长稳内存泄漏问题，长时间推理过程中进程内存持续增长。

  已知触发样例来自 issue `42209`：使用 `converter_lite --optimize=ascend_oriented` 转换的
  `hdc_efficientnet_b3_1w_class.onnx` 模型，在 Ascend710 + CANN 8.5.0 环境下做长稳推理时出现内存泄漏。
issue_refs:
  - issue_id: "42209"
    title: "[Bug]: MindSporeLite云侧推理，在Ascend后端发现内存泄露"
    url: "https://gitcode.com/mindspore/org-issues/issues/42209"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "围绕 Lite Ascend 推理长稳场景排查模型 build/predict 循环中的宿主侧资源释放缺口。"
  diff: |
    1. 固定 `Ascend710 + hdc_efficientnet_b3_1w_class` 长稳脚本，确认是 build、predict 还是监控阶段导致内存持续增长。
    2. 检查 Lite Ascend 推理上下文、workspace、tensor buffer 与模型组资源的释放路径是否完整。
    3. 为云侧 Ascend 推理补长稳内存回归，避免“功能可用但持续泄漏”长期漏过。
