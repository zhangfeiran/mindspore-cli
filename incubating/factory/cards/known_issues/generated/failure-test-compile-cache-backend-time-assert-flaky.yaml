detection:
  pattern: "(compile_backend_time_1 > compile_backend_time_2|后端编译时间|MS_COMPILER_CACHE_ENABLE)"
description: |
  JIT 编译缓存特性交互测试如果直接断言“第二次后端编译时间一定更短”，在异构执行和 tuple 输出等场景下会偶现失败。

  已知触发样例来自 issue `42136`：开启 `MS_COMPILER_CACHE_ENABLE=1` 后，同一用例执行两次，
  前端编译时间明显下降，但第二次记录到的 `compile_backend_time` 反而略高，导致测试中的
  `assert compile_backend_time_1 > compile_backend_time_2` 偶现失败。
issue_refs:
  - issue_id: "42136"
    title: "[Bug]: jit特性交互，异构+输出tuple,比较两次执行图编译时间,第二次比较时校验后端编译时间偶现失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42136"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "把 compile-cache 回归的判断从脆弱的 backend 时间强比较，改成更稳定的缓存命中或前端耗时下降校验。"
  diff: |
    1. 调整 `check_result` 逻辑，不再对 `compile_backend_time_1 > compile_backend_time_2` 做硬断言，尤其是在非 CPU、异构和控制流场景下。
    2. 优先使用缓存产物存在性、MindIR 复用、前端总编译耗时下降等更稳定指标来验证编译缓存是否生效。
    3. 为 `heter + tuple output + grad` 这类容易抖动的 case 单独保留回归，避免再次把统计波动误判成真问题。
