kind: known_issue
id: function-runtime-tensordump-auto-parallel-out-tail-launch-failure
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, tensordump, auto-parallel, dump]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(TensorDump-op0|auto_parallel_tensor_dump_mode_out_02|mode=.?out)"
description: |
  mindspore/org-issues#42329 is a TensorDump placement bug under auto parallel.
  When `TensorDump` is placed at the network tail and dump `mode` is `out`, the
  launch path fails in distributed execution instead of treating the terminal
  dump as a valid out-edge dump point.
issue_refs:
  - issue_id: "42329"
    title: "[Bug]: TensorDump位于网络末尾位置, 自动并行, mode设置为\"out\", 报错Launch kernel failed: Default/network-WithLossCell/_backbone-MatMulReluNet2/TensorDump-op0"
    url: "https://gitcode.com/mindspore/org-issues/issues/42329"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Handle terminal TensorDump nodes explicitly in auto-parallel out-mode lowering"
  diff: |
    --- a/mindspore/ccsrc/debug/data_dump/tensor_dump_pass.cc
    +++ b/mindspore/ccsrc/debug/data_dump/tensor_dump_pass.cc
    @@
    -InsertOutDumpAfter(node);
    +if (IsGraphOutput(node)) {
    +  InsertTailDump(node);
    +} else {
    +  InsertOutDumpAfter(node);
    +}
