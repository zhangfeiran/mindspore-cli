kind: known_issue
id: accuracy-model-qwen3vl-resize-interpolate-mismatch
symptom: accuracy
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, accuracy, qwen3vl, interpolate, resize]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(qwen3vl|精度异常|resize_image|interpolate)"
description: |
  mindspore/org-issues#42408 reports Qwen3VL 8B/30B training precision drift.
  The issue analysis ties the mismatch to `interpolate`: the MindSpore path did
  not align with the torch reference for image resize behavior. The published
  workaround was to adjust the `resize_image` call in
  `torchvision/transforms/v2/functional/_geometry.py` by removing the
  `mode`, `align_corners`, and `antialias` arguments during precision
  alignment, after which 8B and 30B both matched the baseline.
issue_refs:
  - issue_id: "42408"
    title: "[Bug]: qwen3vl 8B/30B网络训练失败，精度异常"
    url: "https://gitcode.com/mindspore/org-issues/issues/42408"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Align Qwen3VL image resizing with the reference path by bypassing the mismatched interpolate arguments"
  diff: |
    --- a/torchvision/transforms/v2/functional/_geometry.py
    +++ b/torchvision/transforms/v2/functional/_geometry.py
    @@
    -return interpolate(img, size=size, mode=mode, align_corners=align_corners, antialias=antialias)
    +return interpolate(img, size=size)

    Notes:
    - Issue comments explicitly say the precision workaround is to comment out
      `mode`, `align_corners`, and `antialia(s)` in `resize_image`.
    - This is a model-side alignment patch, not a general interpolate kernel fix.
