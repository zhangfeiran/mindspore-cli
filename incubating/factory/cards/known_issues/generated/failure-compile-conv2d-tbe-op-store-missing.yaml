kind: known_issue
id: failure-compile-conv2d-tbe-op-store-missing
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [kind-cann, mindspore-org-issues, compile, ge, tbe, conv2d, ascend]
occurrence_count: 1
affects_operators: [conv2d]
affects_platforms: [ascend]
detection:
  pattern: "(Compile graph kernel_graph.*failed|Unsupported_Operator\\(E23002\\)|op type Conv2D is not found in this op store)"
description: |
  Ascend GE 编译阶段如果必需的 TBE 算子仓条目缺失，会在 `Compile graph kernel_graph* failed` 之外继续打印
  `Unsupported_Operator(E23002): op type Conv2D is not found in this op store`。

  已知触发样例来自 issue `42008`：删除 ResNet50 必需的一个 TBE 算子文件后，GE 在编译 `Conv2D` 时无法从多个
  `tbe-custom*` op store 中找到该算子，最终导致图编译失败。
issue_refs:
  - issue_id: "42008"
    title: "[Bug]:删除Resnet50必须的一个TBE算子文件用例 报错GE编译失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42008"
    project: "mindspore/org-issues"
    component: "kind/cann"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "恢复或正确打包缺失的 Conv2D TBE 算子文件，并在编译前增加算子仓完整性检查。"
  diff: |
    1. 回补被删除或漏装的 `Conv2D` TBE 实现文件，确保对应版本的 op store 能解析到该算子。
    2. 检查 CANN/TBE 自定义算子搜索路径和打包内容，避免 `tbe-custom*` 目录存在但关键算子未入仓。
    3. 为“缺失必需 TBE 文件”场景补安装或门禁校验，在进入 GE 编译前直接暴露算子仓缺失，而不是等到 `CompileGraph` 失败。
