kind: known_issue
id: accuracy-operator-logical-and-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, logical-and]
occurrence_count: 1
affects_operators: [logical-and]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42216 reports that `mint.logical_and` on Ascend gives
  a different result from torch for pure-imaginary complex64 inputs. The issue
  comments identify this as a hardware-side Cast semantics mismatch rather than
  an operator precision regression: `aclnnLogicalAnd` casts non-bool inputs to
  bool first, and Ascend 910A/B does not support complex Cast semantics in the
  same way as torch CPU.
issue_refs:
  - issue_id: "42216"
    title: "[Bug]: 算子mint.logical_and的complex64纯虚数类型测试结果与torch不符"
    url: "https://gitcode.com/mindspore/org-issues/issues/42216"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Skip or convert the complex logical_and testcase to an expected-exception / unsupported-case check on Ascend"
  diff: |
    --- a/test_logical_and.py
    +++ b/test_logical_and.py
    @@
    -assert mint.logical_and(complex_input, complex_input) == torch.logical_and(...)
    +with pytest.raises((RuntimeError, TypeError)):
    +    mint.logical_and(complex_input, complex_input)
    Notes:
    - Issue comments say the recommended fix is "跳过该用例或修改为异常用例".
    - The mismatch is caused by Ascend Cast limitations for complex inputs, not
      by a bug in the boolean logical rule itself.
