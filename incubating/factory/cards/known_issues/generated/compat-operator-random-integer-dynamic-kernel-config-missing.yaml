kind: known_issue
id: compat-operator-random-integer-dynamic-kernel-config-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, random, randint, dynamic-kernel-config]
occurrence_count: 1
affects_operators: [randint, randint_like]
affects_platforms: [ascend]
detection:
  pattern: "(mint\\.randint|randint_like|Parse dynamic kernel config fail)"
description: |
  mindspore/org-issues#42229 shows that `mint.randint` and `mint.randint_like`
  share the same backend failure mode on 910A: dynamic kernel config parsing
  fails before integer-random generation can run.
issue_refs:
  - issue_id: "42229"
    title: "[Bug]: mint.randint、mint.randint_like 910a报错Parse dynamic kernel config fail"
    url: "https://gitcode.com/mindspore/org-issues/issues/42229"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Provide dynamic-kernel config support for integer random generation on 910A"
  diff: |
    --- a/cann/op_info/random_int.json
    +++ b/cann/op_info/random_int.json
    @@
    -dynamic_kernel_config: null
    +dynamic_kernel_config: random_int_dynamic.json
