kind: known_issue
id: function-runtime-index-bool-list-dim-overflow-guard
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, index, bool-list, dimension-guard]
occurrence_count: 1
affects_operators: [index]
affects_platforms: [ascend]
detection:
  pattern: "(aclnnIndexGetWorkspaceSize call failed|self tensor cannot be larger than 8 dimensions)"
description: |
  mindspore/org-issues#42260 is an index normalization bug. A list of boolean
  indices expands into a path that reaches ACLNN and only then fails with
  `self tensor cannot be larger than 8 dimensions`. The framework should reject
  the over-expanded indexing pattern before dispatch.
issue_refs:
  - issue_id: "42260"
    title: "[Bug]: 使用list作为Tensor索引，list中含有False的异常场景，报错RuntimeError: aclnnIndexGetWorkspaceSize call failed, please check!"
    url: "https://gitcode.com/mindspore/org-issues/issues/42260"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Guard boolean-list indexing before it expands past backend dimension limits"
  diff: |
    --- a/mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/inner_index.cc
    +++ b/mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/inner_index.cc
    @@
    -DispatchAclnnIndex(self, indices);
    +CheckExpandedIndexDims(self, indices, /*max_dims=*/8);
    +DispatchAclnnIndex(self, indices);
