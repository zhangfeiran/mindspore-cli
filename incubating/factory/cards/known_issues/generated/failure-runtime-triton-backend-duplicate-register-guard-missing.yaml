kind: known_issue
id: failure-runtime-triton-backend-duplicate-register-guard-missing
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, triton, backend-register, duplicate]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(重复注册问题|BackendStrategyRegistry|register\\(\"mindspore\".*test_func)"
description: |
  Triton Ascend 的 backend registry 对重复注册场景缺少保护时，容易导致后注册覆盖前注册或行为不明确。

  该问题在 issue `42276` 中作为独立子问题提出，应单独沉淀为 registry 契约问题，而不是混在泛集成卡里。
issue_refs:
  - issue_id: "42276"
    title: "[Bug]: Triton_ascend对接mindspore后端问题。"
    url: "https://gitcode.com/mindspore/org-issues/issues/42276"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "给 Triton backend registry 增加重复注册检查，避免同一后端/同一方法被静默覆盖。"
  diff: |
    1. 在 `BackendStrategyRegistry.register` 中检测 `(backend, method)` 是否已存在，必要时抛出明确错误。
    2. 为重复注册路径补单元测试，覆盖首次注册、重复注册和显式覆盖三类行为。
    3. 明确 registry 的覆盖策略文档，避免不同插件无意互相踩掉注册项。
