kind: known_issue
id: function-runtime-ops-tensor-alias-regression
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-mdtest, mindspore-org-issues, runtime, attribute, ops, tensor, regression]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(module 'mindspore\\.ops' has no attribute 'Tensor'|ops\\.Tensor)"
description: |
  mindspore/org-issues#42132 reports that MindOne transformer tests started to
  fail with `AttributeError: module 'mindspore.ops' has no attribute 'Tensor'`
  after a refactor in MindSpore. The issue discussion states that an import was
  removed while cleaning up circular-import handling, but external callers still
  depended on the exported `mindspore.ops.Tensor` alias. This is a framework
  regression in the public compatibility surface, not a MindOne-side bug.
issue_refs:
  - issue_id: "42132"
    title: "[Bug]: mindone transformers模型训练报错AttributeError: module 'mindspore.ops' has no attribute 'Tensor'"
    url: "https://gitcode.com/mindspore/org-issues/issues/42132"
    project: "mindspore/org-issues"
    component: "B-MDTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Restore the exported `ops.Tensor` alias instead of forcing downstream projects to rewrite imports"
  diff: |
    --- a/mindspore/ops/__init__.py
    +++ b/mindspore/ops/__init__.py
    @@
    -# refactor removed an import judged unused during circular-import cleanup
    +from mindspore import Tensor
    +__all__.append("Tensor")

    Notes:
    - Issue comments say the regression was introduced while deleting imports
      during a circular-import cleanup.
    - The fix was to revert that deletion so `mindspore.ops.Tensor` remains
      available for existing callers.
