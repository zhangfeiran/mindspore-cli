kind: known_issue
id: accuracy-operator-gru-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, gru]
occurrence_count: 1
affects_operators: [gru]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42268 reports a GRU mismatch on Ascend. The issue
  discussion traces it through `self.reverse_sequence(output_b, seq_length)` and
  concludes the exposed problem is again in the custom `ReverseSequence` path:
  the custom AICPU implementation lacks proper infer registration and mutates
  behavior after CANN changes. The recommended fix is to drop the custom path
  and use the built-in operator.
issue_refs:
  - issue_id: "42268"
    title: "[Bug]: nn.GRU ascend后端计算结果与标杆不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42268"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Remove the custom ReverseSequence dependency in the GRU path and rely on the built-in operator"
  diff: |
    --- a/nn/layer/rnns.py
    +++ b/nn/layer/rnns.py
    @@
    -self.reverse_sequence = custom_reverse_sequence_impl
    +self.reverse_sequence = ops.ReverseSequence(0, 1)
    Notes:
    - The issue discussion ties the GRU mismatch to `self.reverse_sequence(...)`.
    - Final issue comments say the fix is to remove the custom operator path and
      switch to the built-in implementation.
