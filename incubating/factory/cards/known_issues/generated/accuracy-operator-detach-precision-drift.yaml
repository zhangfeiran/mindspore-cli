kind: known_issue
id: accuracy-operator-detach-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, detach]
occurrence_count: 1
affects_operators: [detach]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42158 reports a mismatch after `Tensor.detach()` and
  follow-up tensor operations. The comments say the issue is not in detach
  semantics. The real problem is the `cpu()` helper implementation in
  `msadapter/_tensor.py`; deleting that helper makes the testcase pass.
issue_refs:
  - issue_id: "42158"
    title: "[Bug]: 验证Tensor.detach() 对detach后的tensor做其他处理（如 copy_, view, chunk, contiguous, clone, cpu 等），且这些操作不会影响原张量，其对比结果报错精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42158"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Remove the problematic cpu() helper from msadapter/_tensor.py instead of patching detach"
  diff: |
    --- a/msadapter/_tensor.py
    +++ b/msadapter/_tensor.py
    @@
    -@register_to_tensor
    -def cpu(self):
    -    return self.to("cpu")
    Notes:
    - Issue comment explicitly points to this helper and says deleting it makes
      the testcase pass.
    - The related fix reference is msadapter PR #525.
