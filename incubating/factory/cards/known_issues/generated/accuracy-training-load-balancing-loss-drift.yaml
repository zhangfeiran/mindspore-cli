confidence:
  level: observed
tags: [b-solutiontest, mindspore-org-issues, accuracy, load-balancing-loss, training]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "load_balancing_loss|load balancing loss"
description: |
  mindspore/org-issues#42198 reports deterministic drift in
  `load_balancing_loss` across optimizer choices on a deepseek-mcore network.
  The issue comments tie the regression to a `div` operator overload change
  introduced between 2026-02-06 and 2026-02-10, which affected network
  precision. After the fix, determinism is stable again.
issue_refs:
  - issue_id: "42198"
    title: "[Bug]: deepseek-mcore网络，不管是adamw优化器还是muon优化器，较之前版本，load_balancing_loss确定性误差全都超0"
    url: "https://gitcode.com/mindspore/org-issues/issues/42198"
    project: "mindspore/org-issues"
    component: "B-SolutionTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Use the div-overload fix and update the deterministic baseline for load_balancing_loss"
  diff: |
    --- a/mindspore/div_overload_impl.py
    +++ b/mindspore/div_overload_impl.py
    @@
    -affected overload behavior
    +fixed overload behavior introduced after PR #91609
    Notes:
    - Issue comments explicitly identify PR #91609 as the source of the drift.
    - The same comments recommend updating the deterministic precision baseline
      after the fix lands.
