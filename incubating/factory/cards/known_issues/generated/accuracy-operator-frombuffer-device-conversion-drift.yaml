kind: known_issue
id: accuracy-operator-frombuffer-device-conversion-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, frombuffer, device-conversion]
occurrence_count: 1
affects_operators: [frombuffer]
affects_platforms: [ascend]
detection:
  pattern: "torch\\.frombuffer"
description: |
  mindspore/org-issues#42450 reports an inconsistency when comparing tensors
  created via `torch.frombuffer` on CPU and NPU. The comments show this was not
  one single precision bug. Two separate environment issues were mixed into the
  testcase: bf16 equality behavior on an affected CANN package, and unsupported
  complex64 input in `mindspore.mint.equal`. Later comments say the bf16 part
  was fixed in newer CANN, and that standalone testcase execution was also not
  aligned with the full test environment.
issue_refs:
  - issue_id: "42450"
    title: "[Bug]: 调用torch.frombuffer进行接口测试，在cpu转换和在npu转换后的tensor结果对比不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42450"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Align the testcase with the real environment, avoid unsupported complex64 equal checks, and use a CANN version where the bf16 equality issue is fixed"
  diff: |
    --- a/test_func.py
    +++ b/test_func.py
    @@
    -assert torch.equal(npu_tensor, cpu_tensor)
    +assert npu_tensor.dtype != complex64
    +assert torch.equal(npu_tensor, cpu_tensor)
    Notes:
    - Issue comments say the bf16 mismatch came from CANN and was fixed in the
      0408 CANN package.
    - Comments also state `mindspore.mint.equal` does not support complex64 in
      the reported path, so the testcase should not treat that path as a normal
      equality comparison.
    - Running the case outside the aligned test environment can also produce
      misleading results.
