kind: known_issue
id: function-runtime-bytesio-ckpt-format-contract
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, checkpoint, bytesio, contract]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(BytesIO|load_checkpoint|_is_cipher_file|format=\\\"ckpt\\\")"
description: |
  mindspore/org-issues#42232 reports that `load_checkpoint` crashes with a
  low-level `TypeError` when users pass `io.BytesIO` together with
  `format=\"ckpt\"`. The public issue shows the root cause clearly:
  `_is_cipher_file()` only accepts string paths, but the API reached that code
  path without validating the input contract first.
issue_refs:
  - issue_id: "42232"
    title: "[Bug]: 将ckpt文件读入 BytesIO，使用load_checkpoint加载ckpt,缺少拦截,资料也未说明只支持safetensors"
    url: "https://gitcode.com/mindspore/org-issues/issues/42232"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Validate BytesIO support by format before reaching file-path-only helpers"
  diff: |
    --- a/mindspore/train/serialization.py
    +++ b/mindspore/train/serialization.py
    @@
    +if isinstance(ckpt_file_name, io.BytesIO) and format != "safetensors":
    +    raise ValueError("For 'load_checkpoint', BytesIO input is only supported for safetensors.")
