kind: known_issue
id: failure-operator-lpnormv2-mixed-fp32-fp64-multidim-launch
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, norm, lpnormv2, mixed-dtype, ascend]
occurrence_count: 1
affects_operators: [norm]
affects_platforms: [ascend]
detection:
  pattern: "(Launch kernel failed: Default/LpNormV2-op0|mint\\.norm|p = -3|dtype = mstype\\.float64)"
description: |
  `mint.norm` 在 Ascend 上处理“`float32` 输入 + `dtype=float64` 输出 + 多维归约 + 负 p`”组合时，
  会在 `LpNormV2` kernel 启动阶段直接失败。

  已知触发样例来自 issue `42375`：输入 shape 为 `(2, 50, 44, 50, 29, 2)`，参数
  `p=-3`、`dim=(-1, 0, 3)`、`dtype=float64`，报 `Launch kernel failed: Default/LpNormV2-op0`。
issue_refs:
  - issue_id: "42375"
    title: "[Bug]: mint.norm ascend后端报错Launch kernel failed: Default/LpNormV2-op0"
    url: "https://gitcode.com/mindspore/org-issues/issues/42375"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "补齐 `LpNormV2` 对 mixed fp32/fp64、多轴归约和负 p 组合的参数/类型适配，或在前端提前拦截不支持路径。"
  diff: |
    1. 检查 `mint.norm -> LpNormV2` 适配层在 `input=float32, output=float64, p<0, multi-dim reduction` 组合下是否正确做了 dtype 和 attr 下发。
    2. 如果底层 kernel 本身不支持该组合，则在前端参数校验阶段明确拒绝，而不是让问题落到 `Launch kernel failed`。
    3. 为 `negative p + tuple dims + dtype cast to float64` 这一组组合补回归，防止再次回退到宽泛 kernel launch 失败。
