detection:
  pattern: "(mint\\.cumsum int类型.*全为0|out.*all zero|dtype=int32)"
description: |
  `mint.cumsum` 在 Ascend Pynative 模式下处理 `int32` 输入时，可能直接返回全 0 输出，而参考实现应给出正常的前缀累加结果。

  已知触发样例来自 issue `42270`：`int32` 形状 `(5, 9)` 输入、`dim=-1`、`dtype=None`，
  PyTorch 输出正常累加值，而 MindSpore 结果整张矩阵全为 0。
issue_refs:
  - issue_id: "42270"
    title: "[Bug]: mint.cumsum int类型ascend后端计算就全为0"
    url: "https://gitcode.com/mindspore/org-issues/issues/42270"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "修正 Ascend 路径上 `mint.cumsum` 对整型输入的累加实现或 dtype 下发，避免整型前向结果被错误清零。"
  diff: |
    1. 检查 `mint.cumsum` 在 `int32` 输入且 `dtype=None` 时的后端 dtype 推导，确认是否错误走入了未初始化或清零路径。
    2. 对齐整型 `cumsum` 的前向实现与 PyTorch 语义，必要时增加显式类型提升或单独 kernel 适配。
    3. 为 `int32/int16/bool` 等非浮点输入补 Ascend Pynative 前向回归，重点覆盖“输出全 0”类硬错误。
