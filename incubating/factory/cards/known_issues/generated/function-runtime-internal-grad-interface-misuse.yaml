kind: known_issue
id: function-runtime-internal-grad-interface-misuse
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, runtime, internal-api, grad, msadapter]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(GradOperation.*__name__|_pynative_executor\\.check_run)"
description: |
  mindspore/org-issues#42309 reports that an AMP custom forward/backward test
  crashes with `AttributeError: 'GradOperation' object has no attribute
  '__name__'`. The issue discussion says the testcase was wired to an internal
  executor entrypoint and broke after an internal MindSpore interface change.
  The fix is to stop using the private `_pynative_executor.check_run` path and
  validate gradients through the public backward API instead.
issue_refs:
  - issue_id: "42309"
    title: "[Bug]: 创建函数网络并设置 custom_fwd 和 custom_bwd 2. 执行网络的前向和反向传播，报错 AttributeError: 'GradOperation' object has no attribute '__name__'. Did you mean: '__ne__'?"
    url: "https://gitcode.com/mindspore/org-issues/issues/42309"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Rewrite the testcase to use public autograd execution instead of private executor hooks"
  diff: |
    --- a/test_amp.py
    +++ b/test_amp.py
    @@
    -_pynative_executor.set_grad_flag(True)
    -_pynative_executor.new_graph(mymm, x, y)
     with torch.amp.autocast(device_type="npu", dtype=dtype):
         output = mymm(x, y)
         loss = output.sum()
    -_pynative_executor.end_graph(mymm, loss, x, y)
    -grad_ = C.GradOperation(True, True, True)
    -_pynative_executor.check_run(grad_, mymm, None, (0, 1), x, y)
    +loss.backward()
    +assert x.grad.shape == torch.Size([8, 8])
    +assert y.grad.shape == torch.Size([8, 8])

    Notes:
    - Issue comments explicitly say the old testcase depended on an internal
      interface and should be decoupled from it.
    - This is a caller-side adaptation, not a request to patch `GradOperation`.
