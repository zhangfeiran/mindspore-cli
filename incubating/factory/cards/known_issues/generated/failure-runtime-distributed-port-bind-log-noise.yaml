kind: known_issue
id: failure-runtime-distributed-port-bind-log-noise
symptom: failure
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, distributed, port, log-noise, tcp-server]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(evconnlistener_new_bind failed|Address already in use|端口被占用)"
description: |
  In distributed training, a temporary port collision can be harmless because
  the framework retries other ports successfully. The bug is that this normal
  fallback path still prints an error-level log, causing reliability tests to
  fail on log scanning.
issue_refs:
  - issue_id: "42342"
    title: "[Bug]: resnet50 8卡info日志训练，pynative模式, 训练正常，但是有ERROR日志：mindspore/ccsrc/cluster/rpc/core/communicator/tcp_server.cc:281] Init] evconnlistener_new_bind failed, errno: 98 (Address already in use)"
    url: "https://gitcode.com/mindspore/org-issues/issues/42342"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Retry alternate ports for the occupied-port case and suppress the unnecessary error-level log."
  diff: |
    1. Treat `Address already in use` during listener init as a retryable path,
       not a hard error.
    2. Retry port binding until an available port is found.
    3. Demote or remove the spurious error log so successful fallback no longer
       pollutes reliability/error-log checks.
