fix:
  summary: "对齐 SparseFlashAttention 在新旧 CANN 版本下的数值路径和特殊值处理，恢复升级前精度基线。"
  diff: |
    1. 固定相同输入，在升级前后对比 `SparseFlashAttention` 的输出、mask 处理和特殊值传播行为。
    2. 检查新 CANN 下算子选择路径、layout 适配和 `NaN/Inf` 处理是否发生变化，必要时补框架侧兼容逻辑或临时白名单规避。
    3. 为 `constraints_validation`、`different_n1`、`sparse_block_size`、`nan/inf inputs`、`layout_tnd` 等 case 补分场景回归。
