kind: known_issue
id: function-runtime-tensordataset-repr-async-index-check
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, tensor, dataset, index]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(TensorDataset|__repr__|Index is out of bounds)"
description: |
  mindspore/org-issues#42300 is not a generic index failure. Iterating a
  `TensorDataset` triggers `Tensor.__repr__`, which hits an index check in
  `tensor_index_py.cc`. The bounds validation runs too late on the async path,
  so a valid sample print can fail with `Index is out of bounds`.
issue_refs:
  - issue_id: "42300"
    title: "[Bug]: 遍历Tensor数据报index越界。IndexError: Index is out of bounds."
    url: "https://gitcode.com/mindspore/org-issues/issues/42300"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Move tensor index bounds validation before the async repr access"
  diff: |
    --- a/mindspore/ccsrc/pybind_api/pynative/tensor/tensor_index_py.cc
    +++ b/mindspore/ccsrc/pybind_api/pynative/tensor/tensor_index_py.cc
    @@
    -LaunchAsyncIndexRead(self, index);
    -CheckIndexValid(self, index);
    +CheckIndexValid(self, index);
    +LaunchAsyncIndexRead(self, index);
