kind: known_issue
id: function-runtime-micro-build-context-null
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, micro, mindir, context, lite]
occurrence_count: 1
affects_platforms: [cpu]
detection:
  pattern: "(MSModelBuildFromFile failed, ret: -3|ms_context_handle==NULL)"
description: |
  mindspore/org-issues#42317 reports that converting `thermal_sdae.mindir` to a
  micro training project succeeds, but runtime build fails with
  `MSModelBuildFromFile failed, ret: -3`. The public root-cause comment is
  explicit: `MSModelBuildFromFile` received `ms_context_handle == NULL`, so the
  C API treated it as an invalid parameter and aborted.
issue_refs:
  - issue_id: "42317"
    title: "[Bug]:  thermal_sdae.mindir模型执行micro训练，报错MSModelBuildFromFile failed, ret: -3"
    url: "https://gitcode.com/mindspore/org-issues/issues/42317"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "closed"
fix:
  summary: "Create and pass a valid micro context handle before calling `MSModelBuildFromFile`"
  diff: |
    --- a/micro/benchmark/benchmark.c
    +++ b/micro/benchmark/benchmark.c
    @@
    -MSContextHandle ctx = NULL;
    +MSContextHandle ctx = MSContextCreate();
     status = MSModelBuildFromFile(model, model_path, model_type, ctx);

    Notes:
    - Public issue comments explicitly say the fix is to call `MSContextCreate`
      and pass the non-null handle into `MSModelBuildFromFile`.
    - The linked repair PR is `mindspore-lite/pull/624`.
