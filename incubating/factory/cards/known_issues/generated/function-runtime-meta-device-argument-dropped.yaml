kind: known_issue
id: function-runtime-meta-device-argument-dropped
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, meta, mint, rand, empty]
occurrence_count: 2
affects_platforms: [ascend]
detection:
  pattern: "(device='meta'|device=\\\"meta\\\"|g_sync_copy_func|mint\\.rand|mint\\.empty)"
description: |
  mindspore/org-issues#42223 and #42224 report that meta tensor creation APIs
  do not honor `device='meta'` reliably. In one path, `mint.empty` without an
  explicit device leaves parameters on a bad sync-copy path and triggers a
  `g_sync_copy_func` failure during network init. In another path,
  `mint.rand(..., device='meta')` simply does not create a meta tensor. Both
  issues point to factory-style creation helpers dropping or mishandling the
  meta device argument.
issue_refs:
  - issue_id: "42223"
    title: "[Bug]: 在init中初始化mint.empty在meta上，初始化网络时g_sync_copy_func指针错误"
    url: "https://gitcode.com/mindspore/org-issues/issues/42223"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
  - issue_id: "42224"
    title: "[Bug]: 基于 rand 系列创建：mint.rand() 直接设置device=meta失效"
    url: "https://gitcode.com/mindspore/org-issues/issues/42224"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Plumb `device='meta'` through mint factory functions and parameter initialization"
  diff: |
    --- a/mindspore/mint/factory.py
    +++ b/mindspore/mint/factory.py
    @@
    -def rand(*shape, dtype=None, device=None):
    -    return _rand_impl(shape, dtype=dtype)
    +def rand(*shape, dtype=None, device=None):
    +    return _rand_impl(shape, dtype=dtype, device=device)

    --- a/mindspore/mint/factory.py
    +++ b/mindspore/mint/factory.py
    @@
    -def empty(shape, dtype=None, device=None):
    -    return _empty_impl(shape, dtype=dtype)
    +def empty(shape, dtype=None, device=None):
    +    return _empty_impl(shape, dtype=dtype, device=device)
