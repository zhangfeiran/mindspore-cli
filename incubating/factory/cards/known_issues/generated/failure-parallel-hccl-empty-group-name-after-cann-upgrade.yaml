kind: known_issue
id: failure-parallel-hccl-empty-group-name-after-cann-upgrade
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, hccl, group-name, cann-upgrade, parallel]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(group name\\[\\] length\\[0\\] is invalid|group name is invalid|HCCL)"
description: |
  CANN 升级后，部分并行训练/图执行场景会向 HCCL 下发空 group name，导致运行时直接报
  `group name[] length[0] is invalid`。

  已知触发样例来自 issue `42236`：同一批用例在 `mindspore abd023d699 + cann_8.5.0_20260105` 上通过，
  升级到 `mindspore c899f34db + cann_9.0.0_20260210` 后，在 910A/910B 上稳定报 HCCL group name 非法。
issue_refs:
  - issue_id: "42236"
    title: "[Bug]: 训练时hccl报错group name[] length[0] is invalid"
    url: "https://gitcode.com/mindspore/org-issues/issues/42236"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "修正并行路径向 HCCL 传递通信组名的逻辑，避免升级后生成空 group name。"
  diff: |
    1. 对比新旧版本在通信组创建和复用阶段的 group name 生成逻辑，确认哪里把合法组名退化成了空串。
    2. 在调用 HCCL 前增加非空校验和更早的框架侧报错，避免错误直接落到底层 `param_check.cc`。
    3. 为 `ms_ge_format_io_refresh`、`request_exit_callback`、`auto_parallel amp` 等已复现场景补并行回归。
