kind: known_issue
id: failure-operator-ringattentionupdate-binary-missing
symptom: failure
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, ringattentionupdate, binary, aclnn, ascend]
occurrence_count: 1
affects_operators: [ringattentionupdate]
affects_platforms: [ascend]
detection:
  pattern: "(Call aclnnRingAttentionUpdate failed|RingAttentionUpdate does not has any binary|Kernel GetWorkspace failed)"
description: |
  `ops.ring_attention_update` 在 Ascend 上如果未提供对应的算子 binary，会在调用 ACLNN 自定义实现时直接失败，
  典型日志为 `Call aclnnRingAttentionUpdate failed` 和 `Op RingAttentionUpdate does not has any binary`。

  已知触发样例来自 issue `42356`：兼容性测试在 `SBH` 布局、`float32` 输入下执行 `ops.ring_attention_update`
  时，运行时无法找到该算子的 binary，最终在 workspace 获取阶段报错退出。
issue_refs:
  - issue_id: "42356"
    title: "[Bug]: [兼容性测试]RingAttentionUpdate算子报错Call aclnnRingAttentionUpdate failed"
    url: "https://gitcode.com/mindspore/org-issues/issues/42356"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "补齐 RingAttentionUpdate 的 ACLNN/TBE binary 产物和发布链路，避免 runtime 命中“算子无 binary”。"
  diff: |
    1. 检查 `ring_attention_update` 对应的自定义算子实现是否已生成并安装到运行环境可检索的位置。
    2. 校验 pyboost/customize 侧注册名与底层 binary 名称一致，避免前端调用 `aclnnRingAttentionUpdate` 时命中了空注册。
    3. 为 `SBH` 布局和典型长序列配置补兼容性回归，确保门禁能覆盖“binary 缺失”类发布问题。
