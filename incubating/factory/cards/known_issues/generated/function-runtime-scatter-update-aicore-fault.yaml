kind: known_issue
id: function-runtime-scatter-update-aicore-fault
symptom: failure
severity: critical
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, b-sig-kit, mindspore-org-issues, scatter, aicore-fault]
occurrence_count: 2
affects_operators: [scatterndupdate, tensorscatterupdate]
affects_platforms: [ascend]
detection:
  pattern: "(ScatterNdUpdate_|TensorScatterUpdate-op0|Aicore kernel execute failed)"
description: |
  mindspore/org-issues#42365 and #42383 are the same failure family: scatter
  update kernels hit AICore execution faults in real execution rather than
  raising shape/index validation errors earlier. One reproducer is mixed tensor
  index assignment, the other is a YOLOv8 training graph that reaches
  `TensorScatterUpdate`.
issue_refs:
  - issue_id: "42365"
    title: "[Bug]: 多tensor混合索引赋值场景, A[Tensor(np.array([[0, 1],[1, 0]])) raise error: RuntimeError: Sync stream failed:Ascend_4, plog: Aicore kernel execute failed fault kernel_name=ScatterNdUpdate_"
    url: "https://gitcode.com/mindspore/org-issues/issues/42365"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "严重"
    status: "closed"
  - issue_id: "42383"
    title: "[Bug]: mindyolo yolov8网络训练报错Op execute failed. origin_op_name [Default/TensorScatterUpdate-op0]"
    url: "https://gitcode.com/mindspore/org-issues/issues/42383"
    project: "mindspore/org-issues"
    component: "B-SIG-Kit"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Validate scatter index/update layout before dispatch and avoid malformed AICore scatter execution"
  diff: |
    --- a/mindspore/ops/kernel/ascend/aclnn/scatter_update.cc
    +++ b/mindspore/ops/kernel/ascend/aclnn/scatter_update.cc
    @@
    -LaunchScatterNdUpdate(input, indices, updates);
    +CheckScatterUpdateInputs(input, indices, updates);
    +LaunchScatterNdUpdate(input, indices, updates);
