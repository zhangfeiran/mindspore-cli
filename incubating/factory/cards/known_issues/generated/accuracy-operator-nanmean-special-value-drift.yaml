kind: known_issue
id: accuracy-operator-nanmean-special-value-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, special-value-drift, nanmean]
occurrence_count: 1
affects_operators: [nanmean]
affects_platforms: [ascend, cpu]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42161 reports that `nanmean` gives the wrong backward
  result when the input is all NaN. The issue comments identify the actual bug:
  the backward path depended on generic `masked_fill`-style semantics and
  wrongly zeroed the gradient when `count == 0`, instead of propagating NaN.
  The fix was to add a dedicated nanmean backward implementation.
issue_refs:
  - issue_id: "42161"
    title: "[Bug]: nanmean输入为nan时输出与标杆不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42161"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend,CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Add a dedicated NanMean backward cell instead of relying on the generic masked_fill chain"
  diff: |
    --- a/mindspore/python/mindspore/ops/function/math_func.py
    +++ b/mindspore/python/mindspore/ops/function/math_func.py
    @@
    -# nanmean bprop inferred through generic chain
    +class _NanMeanWithBprop(Cell):
    +    ...
    Notes:
    - Issue comments explicitly say the fix is to add module-level
      `_NanMeanWithBprop(Cell)`.
    - The same comments mention regression coverage in
      `tests/st/ops/test_func_nanmean.py`.
