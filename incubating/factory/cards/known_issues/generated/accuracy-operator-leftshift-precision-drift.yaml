kind: known_issue
id: accuracy-operator-leftshift-precision-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, leftshift]
occurrence_count: 1
affects_operators: [leftshift]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42258 reports occasional `leftshift` mismatches. The
  issue discussion shows two linked factors: the benchmark input can be
  polluted if reused directly after the backend call, and the long-term fix is
  to adapt to the newer `aclnnleftShift` implementation from CANN. The comment
  also notes that one exception-case assertion must be loosened because the
  newer backend changes the exact error text.
issue_refs:
  - issue_id: "42258"
    title: "[Bug]: leftshift 偶现计算结果与标杆不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42258"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Use the new aclnnleftShift path and copy benchmark inputs before reuse"
  diff: |
    --- a/test_leftshift.py
    +++ b/test_leftshift.py
    @@
    -torch_input = input_x
    +torch_input = input_x.copy()
    @@ exception case
    -assert "full old error message" in str(exc)
    +assert "TypeError" in str(exc)
    Notes:
    - One issue comment says the torch benchmark input was polluted when reused.
    - Another comment says the real operator-side fix is to adapt to the new
      `aclnnleftShift` implementation and to relax the exception keyword check.
