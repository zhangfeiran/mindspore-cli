kind: known_issue
id: accuracy-training-runtime-megatron-mismatch
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [mindformerstest, mindspore-org-issues, accuracy, megatron, runtime]
occurrence_count: 2
affects_platforms: [ascend]
detection:
  pattern: "(megatron|对齐|不一致)"
description: |
  mindspore/org-issues#42193 and #42222 report TFLOPS calculation mismatches
  against Megatron. The issue comments give two concrete root causes across the
  two reports: Megatron updated the TFLOPS calculation logic, and later changed
  hybrid-model layer counting from ratio-based logic to parsing the
  `hybrid_layer_pattern` string. The MindFormers implementation had to be
  updated to stay aligned.
issue_refs:
  - issue_id: "42193"
    title: "[Bug]: 【MindFormers】【B版本】【新特性】TFLOPS计算接口在test_moe_with_latent_size场景下和megatron结果不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42193"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
  - issue_id: "42222"
    title: "[Bug]: 【MindFormers】【冒烟】TFLOPS计算接口结果和megatron不一致导致用例失败"
    url: "https://gitcode.com/mindspore/org-issues/issues/42222"
    project: "mindspore/org-issues"
    component: "MindFormersTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Sync the TFLOPS calculation and hybrid-layer counting logic with Megatron"
  diff: |
    --- a/mindformers/tools/tflops.py
    +++ b/mindformers/tools/tflops.py
    @@
    -is_hybrid_model = args.is_hybrid_model
    -layer_counts = calculate_layer_counts(...)
    +is_hybrid_model = args.hybrid_layer_pattern is not None
    +layer_counts = get_hybrid_layer_counts(args.hybrid_layer_pattern)
    Notes:
    - Issue #42193 points to syncing the TFLOPS code with Megatron updates.
    - Issue #42222 gives the more detailed follow-up diff shape and references
      MindFormers PRs #8087 and #8120.
