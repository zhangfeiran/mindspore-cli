kind: known_issue
id: failure-runtime-tsan-analysis-schedule-reentrant-lock
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, tsan, static-analysis, mutex, data-race]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(ThreadSanitizer: double lock of a mutex|AnalysisSchedule::EnterWaiting|async_eval_result\\.h:67)"
description: |
  mindspore/org-issues#42361 is a concrete synchronization bug in static
  analysis scheduling. The TSAN report points directly at
  `AnalysisSchedule::EnterWaiting()` in `async_eval_result.h`, where the same
  mutex is re-locked and adjacent state is written without proper synchronization.
issue_refs:
  - issue_id: "42361"
    title: "[Bug]: mindspore的TSAN的包执行用例报错 ThreadSanitizer: double lock of a mutex 和Data race"
    url: "https://gitcode.com/mindspore/org-issues/issues/42361"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Remove re-entrant locking and protect waiting-state updates in `AnalysisSchedule::EnterWaiting`"
  diff: |
    --- a/mindspore/ccsrc/frontend/jit/ps/static_analysis/async_eval_result.h
    +++ b/mindspore/ccsrc/frontend/jit/ps/static_analysis/async_eval_result.h
    @@
    -std::lock_guard<std::mutex> lock(wait_mutex_);
    -wait_mutex_.lock();
    -waiting_ = true;
    +std::lock_guard<std::mutex> lock(wait_mutex_);
    +waiting_ = true;
