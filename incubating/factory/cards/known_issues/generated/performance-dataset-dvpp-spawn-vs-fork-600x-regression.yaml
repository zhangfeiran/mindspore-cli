description: |
  静态图 `pipeline` 模式下，`GeneratorDataset` 使用 DVPP 算子并开启多进程时，
  `spawn` 模式相对 `fork` 模式出现超过 600 倍的极端性能劣化。

  issue `42115` 中给出的实测数据为 `fork_time ≈ 1.207s`，`spawn_time ≈ 635.767s`，
  已明显超出合理波动范围。
