fix:
  summary: "专项排查 DVPP + GeneratorDataset 在 spawn 多进程模式下的初始化和进程间资源复制开销。"
  diff: |
    1. 固定 issue 中的 `pipeline + GeneratorDataset + DVPP` 用例，分别测量 `spawn` 与 `fork` 的初始化/稳态耗时。
    2. 检查 DVPP 资源初始化、进程间句柄复制和数据管线启动逻辑是否在 `spawn` 模式下被重复放大。
    3. 为多进程数据管线补 `spawn/fork` 对比基线，避免同类 100x+ 退化再次进入主线。
