fix:
  summary: "优先排查 FusedInferAttentionScore 在新 CANN 路径上的 kernel 命中、参数传递和输出写回是否失效。"
  diff: |
    1. 对 `dynamic`、`IFA branch`、`PFA branch` 三类用例固定输入，确认升级前后是否稳定从正常输出退化为全 0。
    2. 检查新 CANN 下 `FusedInferAttentionScore` 的分支选择、layout/shape 参数、mask/scale 和 workspace 是否正确传到内核。
    3. 若短期无法修正底层行为，先在框架侧按版本白名单回退旧实现或禁用问题路径，避免门禁继续产出全 0 结果。
