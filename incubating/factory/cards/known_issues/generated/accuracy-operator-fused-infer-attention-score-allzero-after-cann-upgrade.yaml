detection:
  pattern: "(fused_infer_attention_score.*全0|all0|CANN升级.*精度错误.*全0)"
description: |
  `FusedInferAttentionScore` 在 CANN 升级后出现“输出全 0”型精度回归。这类问题比一般数值漂移更严重，
  通常意味着 kernel 路径、mask/scale 传参或 workspace/输出写回出现了硬错误。
issue_refs:
  - issue_id: "42240"
    title: "[Bug]: [OPS][CANN升级]算子执行出现精度错误 （全0）"
    url: "https://gitcode.com/mindspore/org-issues/issues/42240"
