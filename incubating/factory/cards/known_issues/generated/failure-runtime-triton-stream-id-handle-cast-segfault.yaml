kind: known_issue
id: failure-runtime-triton-stream-id-handle-cast-segfault
symptom: failure
severity: critical
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, triton, stream, segfault, ascend]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(triton和stream叠加使用.*Segmentation fault|get_current_stream\\(\\).*stream_a\\.id|device_stream)"
description: |
  Triton Ascend 对接 MindSpore 时，如果把 `stream.id` 误当作真实 `rtStream_t` 句柄传给底层，
  在多流场景下会退化成错误流甚至触发 `Segmentation fault`。

  issue `42276` 中明确指出 `get_current_stream()` 返回的是 `stream_a.id`，而非真实的
  `stream_a.device_stream` 句柄，导致流隔离失效。
issue_refs:
  - issue_id: "42276"
    title: "[Bug]: Triton_ascend对接mindspore后端问题。"
    url: "https://gitcode.com/mindspore/org-issues/issues/42276"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "在 Triton-MindSpore 适配层传递真实 `device_stream` 句柄，而不是逻辑 `stream.id`。"
  diff: |
    1. 修正 `get_current_stream()` 或对应桥接层，让 Triton Ascend 获取到真实的 `rtStream_t`/`device_stream`。
    2. 为多流场景补流隔离与稳定性回归，覆盖 `StreamCtx(stream_a)`、`StreamCtx(stream_b)` 交替执行的 case。
    3. 避免再通过 `reinterpret_cast` 把逻辑 stream id 当成底层流句柄使用。
