kind: known_issue
id: accuracy-operator-jacfwd-precision-drift
symptom: accuracy
severity: high
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, accuracy, precision-drift, jacfwd]
occurrence_count: 1
affects_operators: [jacfwd]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#42444 reports a `jacfwd` accuracy failure in a
  multi-input multi-output network. The issue discussion shows `jacfwd`
  itself is not wrong. The mismatch comes from the reference gradient path:
  one input value becomes extremely small, so dividing by that value amplifies
  floating-point error and makes the "normal" gradient path look inconsistent.
  The recommended fix is to constrain the testcase input lower bound.
issue_refs:
  - issue_id: "42444"
    title: "[Bug]: jacfwd 函数在多输入多输出网络中的梯度计算,固定seed=1775240209报错精度问题"
    url: "https://gitcode.com/mindspore/org-issues/issues/42444"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Clip the testcase inputs away from zero so the reference gradient path does not amplify numerical noise"
  diff: |
    --- a/test_jacfwd.py
    +++ b/test_jacfwd.py
    @@
    -x = np.random.rand(4, 4).astype(np.float32)
    -y = np.random.rand(4, 4).astype(np.float32)
    -z = np.random.rand(4, 4).astype(np.float32)
    +x = np.clip(np.random.rand(4, 4).astype(np.float32), a_min=1e-3, a_max=None)
    +y = np.clip(np.random.rand(4, 4).astype(np.float32), a_min=1e-3, a_max=None)
    +z = np.clip(np.random.rand(4, 4).astype(np.float32), a_min=1e-3, a_max=None)
    Notes:
    - Issue comment explicitly recommends clipping the input lower bound in the
      testcase.
    - The problematic value in `y` was around `7.7e-06`, which magnified the
      numeric error in the reference backward calculation.
