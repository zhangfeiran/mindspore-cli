description: |
  mindspore/org-issues#42157 reports a dtype mismatch in an `amp.autocast`
  testcase on NPU. The comments say the runtime autocast logic had already been
  fixed to align with torch, and the remaining failure was caused by a stale
  testcase assertion. The last assertion compared the wrong dtype pair.
issue_refs:
  - issue_id: "42157"
    title: "[Bug]: 检查amp.autocast` 在 `device_type='npu'` 时，`enabled=True` 和 `enabled=False` 的输出数据类型的不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42157"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Correct the testcase assertion to match the fixed autocast behavior"
  diff: |
    --- a/test_func.py
    +++ b/test_func.py
    @@
    -assert g_float32.dtype == f_float32.dtype
    +assert c_float32.dtype == f_float32.dtype
    Notes:
    - Issue comment explicitly says the last assertion should be changed to
      `assert c_float32.dtype == f_float32.dtype`.
    - The old testcase passed only because the earlier MSA autocast logic was
      itself wrong.
