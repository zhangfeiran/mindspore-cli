  pattern: "(mf 开启确定性计算，两次计算结果不一致|check_llama3_8b_deterministic_on|context.*deterministic.*ON)"
description: |
  `Llama3 8B` 训练在显式开启 `context.deterministic=ON` 后，重复运行两次仍然出现 loss 曲线分歧，
  说明确定性开关没有覆盖到完整执行路径。
issue_refs:
  - issue_id: "42316"
    title: "[Bug]: mf 开启确定性计算，两次计算结果不一致"
    url: "https://gitcode.com/mindspore/org-issues/issues/42316"
