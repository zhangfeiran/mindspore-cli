fix:
  summary: "对齐 `deterministic=ON` 在 Llama3 8B 训练路径上的真实覆盖范围，确保重复运行 loss 一致。"
  diff: |
    1. 固定 `check_llama3_8b_deterministic_on.yaml` 的 8 卡配置，确认首个分歧 step 和对应 loss 偏移。
    2. 检查确定性开关是否实际传递到通信、kernel 选择和图编译路径，而不是仅设置在前端 context。
    3. 为 `deterministic=ON` 的 Llama3 训练路径补专项一致性回归，不再依赖泛化 determinism 卡。
