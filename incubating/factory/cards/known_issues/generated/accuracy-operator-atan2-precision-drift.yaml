description: |
  mindspore/org-issues#42217 groups 910A/910B `atan2` output mismatches for a
  bool edge case. The discussion says this is a 910A hardware limitation:
  missing TBE instructions make some boundary-value scenarios unsupported, so
  910A cannot be forced to match torch and 910B on that scene.
