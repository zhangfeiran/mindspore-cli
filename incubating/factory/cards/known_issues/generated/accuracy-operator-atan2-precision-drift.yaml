fix:
  summary: "Exclude the unsupported 910A bool edge case from the testcase instead of trying to force operator parity"
  diff: |
    --- a/test_atan2.py
    +++ b/test_atan2.py
    @@
    -run_bool_edge_case_on_910a()
    +pytest.skip("910A hardware limitation: bool edge case unsupported")
    Notes:
    - Issue comment says the fix is "修改用例，该边界场景不看护910A硬件".
    - This is a hardware-bound limitation, not a generic atan2 formula bug.
