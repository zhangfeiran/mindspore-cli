kind: known_issue
id: failure-runtime-fuzz-mindir-load-shape-guard-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, fuzz, mindir, cpu, shape-guard]
occurrence_count: 2
affects_platforms: [cpu]
detection:
  pattern: "(fuzz修改.*重新加载运行.*Segmentation fault|CropAndResize|ResizeBilinearV2)"
description: |
  mindspore/org-issues#42388 and #42396 are the same class of robustness bug:
  fuzzed MINDIR models are reloaded and executed on CPU, and kernel code reads
  shape-dependent fields without validating the decoded shape metadata first.
  One crash occurs in `CropAndResizeCpuKernelMod::BilinearV2Resize`, the other
  in `ResizeBilinearCpuKernelMod::LaunchFloat16Kernel`.
issue_refs:
  - issue_id: "42388"
    title: "[Bug]: Linux_x86_64 环境op.CropAndResize算子模型导出后, fuzz修改，重新加载运行，发生Segmentation fault"
    url: "https://gitcode.com/mindspore/org-issues/issues/42388"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "closed"
  - issue_id: "42396"
    title: "[Bug]: Linux_x86_64 环境ops.ResizeBilinearV2算子模型导出后, fuzz修改，重新加载运行，发生Segmentation fault"
    url: "https://gitcode.com/mindspore/org-issues/issues/42396"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "次要"
    status: "closed"
fix:
  summary: "Validate decoded shape metadata before CPU resize kernels index shape arrays"
  diff: |
    --- a/mindspore/ops/kernel/cpu/native/crop_and_resize_cpu_kernel.cc
    +++ b/mindspore/ops/kernel/cpu/native/crop_and_resize_cpu_kernel.cc
    @@
    -const float top_left = ...
    +CHECK_KERNEL_INPUT_SHAPE(image_shape_, 4);
    +const float top_left = ...
    --- a/mindspore/ops/kernel/cpu/native/resize_bilinear_cpu_kernel.cc
    +++ b/mindspore/ops/kernel/cpu/native/resize_bilinear_cpu_kernel.cc
    @@
    -size_t batch_size = shape_[0];
    +CHECK_KERNEL_INPUT_SHAPE(shape_, 4);
    +size_t batch_size = shape_[0];
