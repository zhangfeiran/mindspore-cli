kind: known_issue
id: function-runtime-meta-nonmint-operator-support-missing
symptom: failure
severity: high
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, meta, operator-support, conv2d, stridedslice]
occurrence_count: 1
affects_platforms: [ascend]
detection:
  pattern: "(DeviceCtx\\('meta'\\)|Backend type is invalid.*meta|Cannot copy from tensor which is on meta device)"
description: |
  mindspore/org-issues#42221 reports that running `nn.Conv2d` and related
  non-mint operators inside `ms.DeviceCtx('meta')` fails instead of producing
  meta tensors. The public issue comments say the root cause is that non-mint
  operator paths such as `nn.Conv2d` and `ops.StridedSlice` had not yet been
  wired for meta execution, so execution fell through to real backend/copy
  paths and crashed.
issue_refs:
  - issue_id: "42221"
    title: "[Bug]: ms.DeviceCtx('meta')内执行conv(x) 推理空指针"
    url: "https://gitcode.com/mindspore/org-issues/issues/42221"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "Ascend"
    priority: "主要"
    status: "closed"
fix:
  summary: "Add meta-path support for non-mint operators instead of falling through to real backend execution"
  diff: |
    --- a/mindspore/meta_dispatch/operator_registry.py
    +++ b/mindspore/meta_dispatch/operator_registry.py
    @@
    +register_meta_impl("Conv2D", conv2d_meta_infer)
    +register_meta_impl("StridedSlice", stridedslice_meta_infer)

    Notes:
    - Issue comments explicitly identify non-mint operators as the unsupported
      paths.
    - The repair direction is to route these operators through meta inference
      instead of backend allocation/copy code.
