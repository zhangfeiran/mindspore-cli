kind: known_issue
id: accuracy-operator-sqrt-special-value-drift
symptom: accuracy
severity: medium
lifecycle:
  state: draft
source:
  kind: manual
confidence:
  level: observed
tags: [b-sig-ops, mindspore-org-issues, accuracy, special-value-drift, sqrt]
occurrence_count: 1
affects_operators: [sqrt]
affects_platforms: [ascend]
detection:
  pattern: "(精度|异常值|不一致|nan|inf|loss|accuracy)"
description: |
  mindspore/org-issues#41904 reports abnormal values in repeated backward
  differentiation of `mint.sqrt`. The issue comments say the problem came from
  using a custom AICPU `sqrtgrad` operator. After CANN provided a built-in
  `sqrtgrad` AICPU operator, switching from the custom implementation to the
  CANN operator resolved the problem.
issue_refs:
  - issue_id: "41904"
    title: "[BUG][OPS] CANN包升级8.5 0116, mint.sqrt反向连续求导出现异常值"
    url: "https://gitcode.com/mindspore/org-issues/issues/41904"
    project: "mindspore/org-issues"
    component: "B-SIG-OPS"
    backend: "Ascend"
    priority: "次要"
    status: "closed"
fix:
  summary: "Replace the custom sqrtgrad AICPU operator with the CANN-provided implementation"
  diff: |
    --- a/plugin/device/ascend/kernel/aicpu/custom/sqrt_grad_custom.cc
    +++ b/plugin/device/ascend/kernel/aicpu/cann/sqrt_grad.cc
    @@
    -use custom sqrtgrad aicpu op
    +use CANN-provided sqrtgrad aicpu op
    Notes:
    - Issue comment explicitly says the resolution is to switch from the custom
      operator to the CANN operator.
    - The related framework change is referenced in PR #91889.
