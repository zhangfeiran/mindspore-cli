kind: known_issue
id: function-runtime-mirrorpad-zero-copy-guard
symptom: failure
severity: medium
lifecycle:
  state: stable
source:
  kind: manual
confidence:
  level: observed
tags: [b-componenttest, mindspore-org-issues, runtime, mirrorpad, cpu]
occurrence_count: 1
affects_operators: [mirrorpad]
affects_platforms: [cpu]
detection:
  pattern: "(mirrorpad|memcpy_s error, errorno\\(34\\)|process_dim_one)"
description: |
  mindspore/org-issues#42451 reports that CPU MirrorPad can fail with
  `memcpy_s error, errorno(34)` under a fixed seed. The issue comments identify
  a concrete root cause in the kernel: when padding includes zero, the
  implementation still calls `memcpy_s` with a zero copy size.
issue_refs:
  - issue_id: "42451"
    title: "[Bug]: mirrorpad固定seed=1775232491,  报错TypeError: memcpy_s error, errorno(34)"
    url: "https://gitcode.com/mindspore/org-issues/issues/42451"
    project: "mindspore/org-issues"
    component: "B-ComponentTest"
    backend: "CPU"
    priority: "主要"
    status: "closed"
fix:
  summary: "Skip zero-length copies in MirrorPad instead of calling `memcpy_s`"
  diff: |
    --- a/mindspore/ops/kernel/cpu/native/mirror_pad_cpu_kernel.cc
    +++ b/mindspore/ops/kernel/cpu/native/mirror_pad_cpu_kernel.cc
    @@
    -memcpy_s(dst, size, src, size);
    +if (size != 0) {
    +  memcpy_s(dst, size, src, size);
    +}

    Notes:
    - Public issue comments explicitly state the root cause is zero-size copy.
    - The linked repair PR is `mindspore/pull/92371`.
