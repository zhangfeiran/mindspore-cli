model:
  # OpenAI-compatible API base URL
  # Environment variables (higher priority): MSCLI_BASE_URL (fallback: OPENAI_BASE_URL)
  url: https://api.openai.com/v1
  # Provider identifier for protocol routing
  # Environment variables (higher priority): MSCLI_PROVIDER
  provider: openai-compatible
  # Model name
  # Environment variables (higher priority): MSCLI_MODEL (fallback: OPENAI_MODEL)
  model: gpt-4o-mini
  # API key (recommended to use env: MSCLI_API_KEY / OPENAI_API_KEY)
  key: ""
budget:
  max_tokens: 32768
  max_cost_usd: 10
ui:
  enabled: true
permissions:
  skip_requests: false
  allowed_tools: []
context:
  max_tokens: 24000
  compaction_threshold: 0.85
memory:
  max_items: 200
  max_bytes: 2097152
  ttl_hours: 168
